<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#8b5cf6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="星月舱">
    <title>EQ-chat✨星月舱🌙</title>

    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%238b5cf6' stroke='%238b5cf6' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z'/></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%238b5cf6' stroke='%238b5cf6' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z'/></svg>">

    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>

    <link rel="stylesheet" href="style.css">

    <style>
        /* 启动加载动画 —— 在 React 还没接管页面时显示，避免白屏焦虑 */
        #boot-loader {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 16px;
            background: #fafafa; z-index: 9999;
            transition: opacity 0.3s ease-out;
        }
        #boot-loader.fade-out { opacity: 0; pointer-events: none; }
        .boot-spark {
            width: 56px; height: 56px;
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            border-radius: 50%;
            animation: bootPulse 1.4s ease-in-out infinite;
            box-shadow: 0 0 40px rgba(139, 92, 246, 0.4);
        }
        @keyframes bootPulse {
            0%, 100% { transform: scale(1); opacity: 0.85; }
            50% { transform: scale(1.15); opacity: 1; }
        }
        .boot-text {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            color: #8b5cf6; font-size: 14px; letter-spacing: 0.05em;
        }
    </style>
</head>
<body class="bg-white text-gray-900 overflow-hidden">
    <div id="boot-loader">
        <div class="boot-spark"></div>
        <div class="boot-text">✨ 星月舱启动中 🌙</div>
    </div>
    <div id="root"></div>

    <script type="text/babel" src="script.js"></script>

    <script>
        // 隐藏启动动画 —— 等 root 里有内容了就淡出
        (function hideBootLoader() {
            const tryHide = () => {
                const root = document.getElementById('root');
                if (root && root.children.length > 0) {
                    const loader = document.getElementById('boot-loader');
                    if (loader) {
                        loader.classList.add('fade-out');
                        setTimeout(() => loader.remove(), 300);
                    }
                } else {
                    setTimeout(tryHide, 100);
                }
            };
            tryHide();
            // 兜底：最长 15 秒强制隐藏，避免首次访问超慢时永远看不到错误
            setTimeout(() => {
                const loader = document.getElementById('boot-loader');
                if (loader) loader.remove();
            }, 15000);
        })();

        // 注册 Service Worker 实现离线缓存（第二次启动起秒开）
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(reg => {
                    console.log('[星月舱] Service Worker 注册成功', reg.scope);
                }).catch(e => {
                    console.warn('[星月舱] Service Worker 注册失败', e);
                });
            });
        }
    </script>
</body>
</html>
