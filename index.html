        const renderLatex = (html) => {
            // 渲染块级公式 $$...$$

                try { return '<div class="katex-block" style="text-align:center;margin:12px 0;font-size:1.1em;">' + katex.renderToString(tex.trim(), { displayMode: true, throwOnError: false }) + '</div>'; }

            html = html.replace(/(?<!\$)\$(?!\$)(.*?)(?<!\$)\$(?!\$)/g, (match, tex) => {
                try { return katex.renderToString(tex.trim(), { displayMode: false, throwOnError: false }); } 
                catch(e) { return match; }
            });
            // 渲染 \[...\] 块级
            html = html.replace(/\\\[([\s\S]*?)\\\]/g, (match, tex) => {
                try { return '<div class="katex-block" style="text-align:center;margin:12px 0;font-size:1.1em;">' + katex.renderToString(tex.trim(), { displayMode: true, throwOnError: false }) + '</div>'; } 
                catch(e) { return match; }
            });
            // 渲染 \(...\) 行内
            html = html.replace(/\\\(([\s\S]*?)\\\)/g, (match, tex) => {
                try { return katex.renderToString(tex.trim(), { displayMode: false, throwOnError: false }); } 
                catch(e) { return match; }
            });

        const cleanRawLatex = (text) => {
            if (!text) return text;
            if (!text.includes('\\')) return text;
            // 先把 $$...$$ 和 $...$ 保护起来
            const protectedParts = [];
            let cleaned = text.replace(/\$\$[\s\S]*?\$\$|\$[^$\n]+?\$/g, (match) => {
                protectedParts.push(match);
                return `\x00MATH${protectedParts.length - 1}\x00`;
            });
            
            // 匹配嵌套花括号：从 startIdx 的 { 开始，返回 { 和 } 之间的内容及结束位置
            const matchBraces = (str, startIdx) => {
                if (str[startIdx] !== '{') return null;
                let depth = 0;
                for (let i = startIdx; i < str.length; i++) {
                    if (str[i] === '{') depth++;
                    else if (str[i] === '}') { depth--; if (depth === 0) return { content: str.slice(startIdx + 1, i), end: i }; }
                }
                return null;
            };
            
            // 从左到右扫描，找到 \命令{ 就处理，循环直到没有变化
            const bothArgsCmds = ['underset', 'overset']; // 保留两个参数的内容
            const dropFirstCmds = ['textcolor', 'colorbox', 'fcolorbox']; // 丢弃第一个参数（颜色）
            const doubleCmds = [...bothArgsCmds, ...dropFirstCmds];
            const singleCmds = ['text', 'textbf', 'textit', 'underline', 'fbox', 'emph', 'mathrm', 'mathbf', 'boldsymbol'];
            const sizeCmds = ['scriptsize', 'small', 'large', 'Large', 'huge', 'Huge', 'normalsize', 'footnotesize', 'tiny', 'LARGE'];
            const allCmds = [...doubleCmds, ...singleCmds];
            
            for (let round = 0; round < 15; round++) {
                let found = false;
                
                // 尺寸命令先清掉
                const beforeSize = cleaned;
                cleaned = cleaned.replace(new RegExp('\\\\(' + sizeCmds.join('|') + ')\\s*', 'g'), '');
                if (cleaned !== beforeSize) found = true;
                
                // 扫描 \cmd{ 模式
                for (const cmd of allCmds) {
                    const needle = '\\' + cmd + '{';
                    const idx = cleaned.indexOf(needle);
                    if (idx === -1) continue;
                    
                    const braceStart = idx + needle.length - 1;
                    const first = matchBraces(cleaned, braceStart);
                    if (!first) continue;
                    
                    if (doubleCmds.includes(cmd)) {
                        // 双参数：\cmd{arg1}{arg2}
                        const nextIdx = first.end + 1;
                        if (nextIdx < cleaned.length && cleaned[nextIdx] === '{') {
                            const second = matchBraces(cleaned, nextIdx);
                            if (second) {
                                let replacement;
                                if (bothArgsCmds.includes(cmd)) {
                                    // underset/overset：两部分都保留
                                    replacement = second.content + ' ' + first.content;
                                } else {
                                    // textcolor 等：丢弃颜色，只留内容
                                    replacement = second.content;
                                }
                                cleaned = cleaned.slice(0, idx) + replacement + cleaned.slice(second.end + 1);
                                found = true; continue;
                            }
                        }
                        // 如果没有第二个参数，当作单参数处理
                        cleaned = cleaned.slice(0, idx) + first.content + cleaned.slice(first.end + 1);
                        found = true;
                    } else {
                        // 单参数：\cmd{内容} → 内容（textbf/mathbf加粗，textit/emph斜体）
                        let replacement = first.content;
                        if (cmd === 'textbf' || cmd === 'mathbf' || cmd === 'boldsymbol') replacement = '**' + first.content + '**';
                        else if (cmd === 'textit' || cmd === 'emph') replacement = '*' + first.content + '*';
                        cleaned = cleaned.slice(0, idx) + replacement + cleaned.slice(first.end + 1);
                        found = true;
                    }
                }
                
                if (!found) break;
            }
            
            // 兜底：清理任何残留的 \命令{内容}
            cleaned = cleaned.replace(/\\[a-zA-Z]+\{([^}]*)\}/g, '$1');
            // &quot; → "
            cleaned = cleaned.replace(/&quot;/g, '"');
            // 恢复数学公式
            cleaned = cleaned.replace(/\x00MATH(\d+)\x00/g, (_, i) => protectedParts[i]);
            return cleaned;
        };

        // ★ 性能优化：用 memo + useMemo 缓存 markdown/LaTeX 渲染结果
        // 避免每次输入框打字时整个会话列表的所有消息都重新跑一遍 marked + KaTeX
        const MessageContent = memo(({ content }) => {

                const cleaned = cleanRawLatex(content || "");
                let h = marked.parse(cleaned);
                h = renderLatex(h);
                return h;
            }, [content]);
            return <div className="prose prose-sm max-w-none text-gray-700 leading-7" dangerouslySetInnerHTML={{ __html: html }} />;
        });

        };

        const compressImage = (file) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const MAX_WIDTH = 1024; const MAX_HEIGHT = 1024;
                        let width = img.width; let height = img.height;
                        if (width > height) { if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } } 
                        else { if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; } }
                        canvas.width = width; canvas.height = height;
                        ctx.drawImage(img, 0, 0, width, height);
                        const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);
                        resolve({ base64: compressedBase64, mimeType: 'image/jpeg' });
                    };
                };
            });
        };

        // ================= IndexedDB 工具层（用于聊天记录，突破 localStorage 5MB 限制）=================
        const DB_NAME = 'xingyue_db';
        const DB_VERSION = 2;
        const STORE_SESSIONS = 'chat_sessions';

        const openDB = () => new Promise((resolve, reject) => {
            const req = indexedDB.open(DB_NAME, DB_VERSION);
            req.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains(STORE_SESSIONS)) {
                    db.createObjectStore(STORE_SESSIONS, { keyPath: 'id' });
                }
            };
            req.onsuccess = (e) => resolve(e.target.result);
            req.onerror = (e) => reject(e.target.error);
        });

        const idbGetAllSessions = async () => {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_SESSIONS, 'readonly');
                const req = tx.objectStore(STORE_SESSIONS).getAll();
                req.onsuccess = () => resolve(req.result || []);
                req.onerror = () => reject(req.error);
            });
        };

        const idbPutSession = async (session) => {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_SESSIONS, 'readwrite');
                tx.objectStore(STORE_SESSIONS).put(session);
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        };

        const idbDeleteSession = async (id) => {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_SESSIONS, 'readwrite');
                tx.objectStore(STORE_SESSIONS).delete(id);
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        };

        const idbPutAllSessions = async (sessions) => {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_SESSIONS, 'readwrite');
                const store = tx.objectStore(STORE_SESSIONS);
                store.clear();
                sessions.forEach(s => store.put(s));
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        };

                }
                localStorage.removeItem('gemini_chat_sessions');

                    idbGetAllSessions().then(sessions => {
                        console.log('[星月舱] 从 IndexedDB 读取会话:', sessions?.length, '条');
                        // ★ 会话数回退保护：如果这次读到的比上次记录的少超过 2 条，
                        // 说明 IndexedDB 可能在写入中被打断、读到了残缺数据，
                        // 此时不直接覆盖，先警告柒柒，避免新操作把残缺状态固化下来
                        const lastKnownCount = parseInt(localStorage.getItem('xingyue_last_session_count') || '0');
                        const currentCount = sessions?.length || 0;
                        const suspiciousLoss = lastKnownCount > 0 && currentCount < lastKnownCount - 2;
                        if (suspiciousLoss) {
                            console.warn(`[星月舱] ⚠️ 检测到会话数异常：上次 ${lastKnownCount} 条，本次只读到 ${currentCount} 条`);
                            // 仍然显示读到的数据（不能空着），但弹个提示让柒柒知道
                            setTimeout(() => {
                                if (typeof showToast === 'function') {
                                    showToast(`⚠️ 历史比上次少了 ${lastKnownCount - currentCount} 条，先别新增对话，建议清缓存重开试试`);
                                }
                            }, 1000);
                        }
                        if (sessions && sessions.length > 0) {
                            sessions.sort((a, b) => b.timestamp - a.timestamp);
                            setHistorySessions(sessions);
                        }
                        // 更新快照（只在没异常时更新，异常时保留旧值，下次重开还能看到警告）
                        if (!suspiciousLoss) {
                            localStorage.setItem('xingyue_last_session_count', String(currentCount));
                        }
                        // ★ 关键修复：必须等 IndexedDB 读完才标记初始化完成
                        // 否则 React state 还是空数组时，保存 useEffect 可能已经触发，
                        // 会用空历史覆盖 setHistorySessions,导致侧边栏丢窗口
                        isInitializedRef.current = true;
                        console.log('[星月舱] 初始化完成，允许保存');
                    }).catch(e => {
                        console.error('[星月舱] 读取聊天记录失败', e);
                        // 读取失败也要设为 true，否则永远不能保存
                        isInitializedRef.current = true;
                    });
                });
                
                const storedHealth = localStorage.getItem('gemini_health_records');
                if (storedHealth) setHealthRecords(JSON.parse(storedHealth));
                
                if (window.innerWidth < 768) setSidebarOpen(false);
                // ★ 已移除这里的 isInitializedRef.current = true，改为 IndexedDB 读完后再置 true
            }, []);

            // 页面关闭/刷新前的兜底保存（使用 ref 读取最新 state）
            const messagesRef = useRef(messages);
            const currentSessionIdRef = useRef(currentSessionId);
            // ★ IndexedDB 写入节流计时器，避免流式输出时每个字符都触发全量写入
            const idbSaveTimerRef = useRef(null);
            const pendingSaveSessionRef = useRef(null);
            useEffect(() => { messagesRef.current = messages; }, [messages]);
            useEffect(() => { currentSessionIdRef.current = currentSessionId; }, [currentSessionId]);
            useEffect(() => {
                const handler = () => {
                    // ★ 页面卸载前先 flush pending 的节流保存
                    if (idbSaveTimerRef.current) {
                        clearTimeout(idbSaveTimerRef.current);
                        idbSaveTimerRef.current = null;
                        pendingSaveSessionRef.current = null;
                    }
                    const msgs = messagesRef.current;
                    const sid = currentSessionIdRef.current;
                    if (sid && msgs && msgs.length > 0) {
                        // 同步触发一次 IndexedDB 写入（浏览器可能拒绝异步，但最大努力）
                        try {
                            const existing = historySessions.find(s => s.id === sid);
                            idbPutSession({
                                id: sid,
                                title: msgs[0]?.content?.slice(0, 20).replace(/!\[.*?\]\(.*?\)/g, '[图片]') || '新对话',
                                messages: msgs,
                                timestamp: Date.now(),
                                createdAt: existing?.createdAt || sid // 兼容旧数据
                            });
                        } catch(e) {}
                    }
                };
                // ★ visibilitychange 是手机浏览器最可靠的"页面切到后台"信号
                // beforeunload/pagehide 在 iOS Safari 和"添加到主屏幕"伪 APP 中经常不触发
                // 而 visibilitychange 在切走的瞬间就会触发，给我们抢救数据的机会
                const visibilityHandler = () => {
                    if (document.visibilityState === 'hidden') {
                        handler();
                    }
                };
                window.addEventListener('beforeunload', handler);
                window.addEventListener('pagehide', handler);
                document.addEventListener('visibilitychange', visibilityHandler);
                return () => {
                    window.removeEventListener('beforeunload', handler);
                    window.removeEventListener('pagehide', handler);
                    document.removeEventListener('visibilitychange', visibilityHandler);
                };
            }, []);

            useEffect(() => {
                if (!isInitializedRef.current) return; // 初始化完成前不写入，防止空数据覆盖
                try {
                    if (config.apiKey) localStorage.setItem('gemini_app_config', JSON.stringify(config));
                    if (config.baseUrl && config.baseUrl.includes('/v1') && config.apiType !== 'openai' && !config.baseUrl.includes('googleapis.com')) {
                        setConfig(prev => ({...prev, apiType: 'openai'}));
                    }
                    localStorage.setItem('gemini_memories', JSON.stringify(memoryFiles));
                    localStorage.setItem('gemini_health_records', JSON.stringify(healthRecords));
                    localStorage.setItem('xingyue_long_term_memories', JSON.stringify(longTermMemories));
                    localStorage.setItem('xingyue_journal_inject_count', journalInjectCount.toString());
                } catch (e) {
                    console.error("Local storage error on config/memories/health", e);
                    showToast("星月舱的存储空间快满啦，记得先备份一下数据哦~");
                }
            }, [config, memoryFiles, healthRecords, longTermMemories, journalInjectCount]);

            useEffect(() => {
                // ★ 初始化未完成（IndexedDB 还没读完）时绝对不能写入
                // 否则会用空 historySessions 覆盖真实数据
                if (!isInitializedRef.current) return;
                if (messages.length > 0 && currentSessionId) {
                    setHistorySessions(prevSessions => {
                        const existingSessionIndex = prevSessions.findIndex(s => s.id === currentSessionId);
                        let updatedSessions;
                        if (existingSessionIndex !== -1) {
                            updatedSessions = [...prevSessions];
                            const currentSession = updatedSessions[existingSessionIndex];
                            let title = currentSession.title;
                            if ((currentSession.title === '新对话' || !currentSession.title) && messages.length > 0) {
                                title = messages[0].content.slice(0, 20).replace(/!\[.*?\]\(.*?\)/g, '[图片]');
                            }
                            updatedSessions[existingSessionIndex] = { ...currentSession, messages: messages, title: title, timestamp: Date.now() };
                            updatedSessions.sort((a, b) => b.timestamp - a.timestamp);
                        } else {
                             const newSession = { id: currentSessionId, title: messages[0]?.content.slice(0, 20).replace(/!\[.*?\]\(.*?\)/g, '[图片]') || '新对话', messages: messages, timestamp: Date.now(), createdAt: Date.now() };
                            updatedSessions = [newSession, ...prevSessions];
                        }
                        // ★ 节流写入 IndexedDB：500ms 内多次变化合并成一次写入
                        // 流式输出时每蹦一个字都触发全量序列化+写入是卡顿主因，节流后能大幅减少主线程阻塞
                        const sessionToSave = updatedSessions.find(s => s.id === currentSessionId);
                        if (sessionToSave) {
                            pendingSaveSessionRef.current = sessionToSave;
                            if (idbSaveTimerRef.current) clearTimeout(idbSaveTimerRef.current);
                            idbSaveTimerRef.current = setTimeout(() => {
                                const toSave = pendingSaveSessionRef.current;
                                if (toSave) {
                                    idbPutSession(toSave).then(() => {
                                        // ★ 写入成功后更新会话数快照，作为下次启动的"已知正常状态"基线
                                        try { localStorage.setItem('xingyue_last_session_count', String(updatedSessions.length)); } catch(e) {}
                                    }).catch(e => console.error('[星月舱] 节流保存会话到 IndexedDB 失败', e));
                                    pendingSaveSessionRef.current = null;
                                }
                                idbSaveTimerRef.current = null;
                            }, 500);
                        }
                        return updatedSessions;
                    });
                }
            }, [messages, currentSessionId]);

            // ★ 兜底：组件卸载或会话切换时，如果还有 pending 的保存就立刻 flush
            useEffect(() => {
                return () => {
                    if (idbSaveTimerRef.current) {
                        clearTimeout(idbSaveTimerRef.current);
                        const toSave = pendingSaveSessionRef.current;
                        if (toSave) {
                            idbPutSession(toSave).catch(e => console.error('[星月舱] 卸载时 flush 失败', e));
                            pendingSaveSessionRef.current = null;
                        }
                    }
                };
            }, []);

            useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages, isLoading]);

            useEffect(() => {
                document.body.className = `overflow-hidden ${config.theme === 'default' ? 'bg-white text-gray-900' : `theme-${config.theme}`}`;
            }, [config.theme]);

            const showToast = (msg, duration=3000) => { setToast(msg); setTimeout(() => setToast(null), duration); };

            const closeUpdateModal = () => {
                setShowUpdateModal(false);
                localStorage.setItem('xingyue_update_seen', UPDATE_VERSION);
            };

            const handleApiFieldChange = (field, value) => {
                setConfig(prev => ({ ...prev, [field]: value }));
                setCurrentPresetId('');
            };

            const handlePresetChange = (e) => {
                const presetId = e.target.value;
                setCurrentPresetId(presetId);
                if (presetId) {
                    const preset = config.apiPresets.find(p => p.id === presetId);
                    if (preset) {
                        setConfig(prev => ({ ...prev, apiType: preset.apiType, baseUrl: preset.baseUrl, apiKey: preset.apiKey, model: preset.model }));
                        showToast(`已切换至: ${preset.name}`);
                    }
                }
            };

            const confirmSavePreset = () => {
                if (!presetNameInput.trim()) { showToast("预设名字不能为空哦"); return; }
                const newPreset = { id: Date.now().toString(), name: presetNameInput.trim(), apiType: config.apiType, baseUrl: config.baseUrl, apiKey: config.apiKey, model: config.model };
                setConfig(prev => ({ ...prev, apiPresets: [...(prev.apiPresets || []), newPreset] }));
                setCurrentPresetId(newPreset.id); setIsSavingNewPreset(false); setPresetNameInput(''); showToast("API 预设已存储~");
            };

            const updatePreset = () => {
                setConfig(prev => {
                    const newPresets = (prev.apiPresets || []).map(p => {
                        if (p.id === currentPresetId) { return { ...p, apiType: prev.apiType, baseUrl: prev.baseUrl, apiKey: prev.apiKey, model: prev.model }; }
                        return p;
                    });
                    return { ...prev, apiPresets: newPresets };
                });
                showToast("API 预设已更新~");
            };

            const deletePreset = () => {
                setConfig(prev => ({ ...prev, apiPresets: (prev.apiPresets || []).filter(p => p.id !== currentPresetId) }));
                setCurrentPresetId(''); showToast("预设已删除");
            };

            const cycleTheme = () => {
                const themes = ['default', 'dark', 'claude'];
                const currentIndex = themes.indexOf(config.theme || 'default');
                const nextTheme = themes[(currentIndex + 1) % themes.length];
                setConfig(prev => ({...prev, theme: nextTheme}));
                showToast(`已切换至: ${nextTheme === 'dark' ? '星空暗夜' : nextTheme === 'claude' ? '琥珀书卷' : '默认极简'} 模式`);
            };

            // ====== 智能标题生成函数 ======
            const autoGenerateTitle = async (targetSessionId, currentMsgs) => {
                if (!config.apiKey) return;
                try {
                    const titlePrompt = "请根据我们的对话，为这次聊天起一个简短、甜美、有氛围感的专属标题（限制在2到8个汉字以内）。注意：只需输出标题文本，绝对不要包含任何标点符号、引号或多余解释。";
                    
                    let payload, url, headers;
                    const baseUrl = config.baseUrl.replace(/\/$/, '');
                    const modelName = config.model || 'gemini-1.5-flash';
                    
                    if (config.apiType === 'openai') {
                        url = `${baseUrl}/chat/completions`;
                        headers = { 'Authorization': `Bearer ${config.apiKey}`, 'Content-Type': 'application/json' };
                        const msgs = currentMsgs.map(m => ({ role: m.role === 'model' ? 'assistant' : 'user', content: m.content.replace(/!\[Image\]\(data:image\/[^;]+;base64,[^\)]+\)/g, '[图片]') }));
                        msgs.push({ role: 'user', content: titlePrompt });
                        payload = { model: modelName, messages: msgs, temperature: 0.7 };
                    } else {
                        url = `${baseUrl}/v1beta/models/${modelName}:generateContent?key=${config.apiKey}`;
                        headers = { 'Content-Type': 'application/json' };
                        const contents = currentMsgs.map(m => ({ role: m.role, parts: [{ text: m.content.replace(/!\[Image\]\(data:image\/[^;]+;base64,[^\)]+\)/g, '[图片]') }] }));
                        contents.push({ role: 'user', parts: [{ text: titlePrompt }] });
                        payload = { contents, generationConfig: { temperature: 0.7 } };
                    }

                    const response = await fetch(url, { method: 'POST', headers, body: JSON.stringify(payload) });
                    if (!response.ok) return;
                    const data = await response.json();
                    
                    let generatedTitle = '';
                    if (config.apiType === 'openai') {
                        generatedTitle = data.choices?.[0]?.message?.content;
                    } else {
                        generatedTitle = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    }
                    
                    if (generatedTitle) {
                        const cleanTitle = generatedTitle.replace(/<think>[\s\S]*?<\/think>/g, '').replace(/["'「」【】《》\n]/g, '').trim().slice(0, 15);
                        if (cleanTitle) {
                            setHistorySessions(prev => {
                                const updated = prev.map(s => s.id === targetSessionId ? { ...s, title: cleanTitle } : s);
                                return updated;
                            });
                            // ★ 关键修复：不要用 React state 里的 session 快照去覆盖数据库
                            // 而是先从数据库读最新的 session，只改 title 字段再写回
                            // 这样可以避免把后续聊天记录覆盖掉
                            try {
                                const db = await openDB();
                                const tx = db.transaction(STORE_SESSIONS, 'readwrite');
                                const store = tx.objectStore(STORE_SESSIONS);
                                const getReq = store.get(targetSessionId);
                                getReq.onsuccess = () => {
                                    const latest = getReq.result;
                                    if (latest) {
                                        latest.title = cleanTitle;
                                        store.put(latest);
                                    }
                                };
                            } catch (dbErr) {
                                console.error('[星月舱] 标题更新数据库失败', dbErr);
                            }
                        }
                    }
                } catch (e) {
                    console.error("Auto title failed", e);
                }
            };
            // ============================

            const HealthCalendar = () => {
                const [currentMonth, setCurrentMonth] = useState(new Date());
                const [editingDate, setEditingDate] = useState(null);
                const [editVal, setEditVal] = useState('');
                const [editAnniversary, setEditAnniversary] = useState('');

                const year = currentMonth.getFullYear();
                const month = currentMonth.getMonth();
                const totalDays = new Date(year, month + 1, 0).getDate();
                const startDay = new Date(year, month, 1).getDay();
                const todayStr = new Date().toISOString().split('T')[0];

                const days = Array(startDay).fill(null).concat(Array.from({ length: totalDays }, (_, i) => i + 1));
                const getFullDate = (d) => `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;

                return (
                    <div className="flex flex-col h-full bg-white">
                        <div className="flex justify-between mb-4 px-2 items-center">
                            <h3 className="font-bold flex items-center gap-2 text-gray-800"><Icon name="Heart" size={18} className="text-pink-500 fill-pink-500"/> 星月日历</h3>
                            <div className="flex gap-2 items-center text-sm">
                                <button onClick={() => setCurrentMonth(new Date(year, month - 1))} className="p-1 hover:bg-gray-100 rounded-full"><Icon name="ChevronLeft" size={16}/></button>
                                <span className="font-medium">{year}年 {month + 1}月</span>
                                <button onClick={() => setCurrentMonth(new Date(year, month + 1))} className="p-1 hover:bg-gray-100 rounded-full"><Icon name="ChevronRight" size={16}/></button>
                            </div>
                        </div>
                        <div className="grid grid-cols-7 text-center text-[10px] text-gray-400 font-bold mb-2">
                            {['日', '一', '二', '三', '四', '五', '六'].map(d => <div key={d}>{d}</div>)}
                        </div>
                        <div className="grid grid-cols-7 gap-1">
                            {days.map((d, i) => {
                                if (!d) return <div key={i}></div>;
                                const dateStr = getFullDate(d);
                                const monthDayStr = dateStr.substring(5);
                                const record = healthRecords[dateStr];
                                const anniversary = config.anniversaries?.[monthDayStr];
                                const isToday = dateStr === todayStr;
                                return (
                                    <div key={i} onClick={() => { setEditingDate(dateStr); setEditVal(record || ''); setEditAnniversary(anniversary || ''); }} className={`h-12 border rounded-lg p-1 cursor-pointer hover:border-blue-300 relative ${isToday ? 'bg-blue-50 border-blue-200' : 'bg-white border-gray-100'}`}>
                                        <span className={`text-[10px] ${isToday ? 'text-blue-600 font-bold' : 'text-gray-500'}`}>{d}</span>
                                        {anniversary && <div className="absolute top-0.5 right-0.5 text-[8px] text-pink-500 font-bold max-w-[90%] truncate">✨{anniversary}</div>}
                                        {record && <div className="mt-1 text-[8px] bg-purple-50 text-purple-600 truncate border border-purple-100 rounded px-0.5">{record}</div>}
                                        {record && <div className="calendar-dot"></div>}
                                    </div>
                                );
                            })}
                        </div>
                        {editingDate && (
                            <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-[70] p-4 backdrop-blur-sm animate-fade-in">
                                <div className="bg-white w-full max-w-xs rounded-xl p-5 shadow-2xl animate-scale-in">
                                    <div className="text-sm font-bold mb-3 text-gray-800">{editingDate} 专属标记</div>
                                    
                                    <label className="block text-[10px] text-gray-500 mb-1 font-medium">每年重复的纪念日/生日</label>
                                    <input 
                                        className="w-full bg-pink-50 border border-pink-100 rounded-lg p-2 text-xs focus:outline-none focus:border-pink-300 mb-3 text-pink-600 font-medium placeholder:text-pink-300" 
                                        value={editAnniversary} 
                                        onChange={e => setEditAnniversary(e.target.value)} 
                                        placeholder="比如：相识纪念日、用户的生日..."
                                    />

                                    <label className="block text-[10px] text-gray-500 mb-1 font-medium">当天的身体状态</label>
                                    <textarea autoFocus className="w-full h-20 bg-gray-50 border border-gray-200 rounded-lg p-3 text-xs focus:outline-none focus:border-blue-400 resize-none" value={editVal} onChange={e => setEditVal(e.target.value)} placeholder="身体哪里不舒服嘛？或已康复？"></textarea>
                                    <div className="flex gap-2 mt-4">
                                        <button onClick={() => setEditingDate(null)} className="flex-1 py-2 text-sm text-gray-500 hover:bg-gray-100 rounded-lg transition-colors">取消</button>
                                        <button onClick={() => { 
                                            setHealthRecords(p => ({ ...p, [editingDate]: editVal })); 
                                            
                                            const mdStr = editingDate.substring(5);
                                            const newConfig = { ...config };
                                            if (!newConfig.anniversaries) newConfig.anniversaries = {};
                                            if (editAnniversary.trim()) {
                                                newConfig.anniversaries[mdStr] = editAnniversary.trim();
                                            } else {
                                                delete newConfig.anniversaries[mdStr];
                                            }
                                            setConfig(newConfig);
                                            
                                            setEditingDate(null); 
                                            showToast("日历已记录"); 
                                        }} className="flex-1 py-2 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700 transition-colors">保存</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            const handleSaveConfig = () => {
                try {
                    localStorage.setItem('gemini_app_config', JSON.stringify(config));
                    localStorage.setItem('gemini_memories', JSON.stringify(memoryFiles));
                    setSettingsOpen(false);
                    showToast("配置已保存");
                } catch (e) {
                    showToast("空间不足，配置保存失败，请清理历史记录");
                }
            };

            const createNewSession = async () => {
                if (messages.length === 0 && !currentSessionId) return;
                // ★ 先清掉 pending 的节流保存，避免与下面的同步 flush 重复
                if (idbSaveTimerRef.current) {
                    clearTimeout(idbSaveTimerRef.current);
                    idbSaveTimerRef.current = null;
                    pendingSaveSessionRef.current = null;
                }
                // 切换前，强制把当前会话 flush 到 IndexedDB，防止流式未完成就被顶掉
                if (currentSessionId && messages.length > 0) {
                    const existing = historySessions.find(s => s.id === currentSessionId);
                    const sessionToFlush = {
                        id: currentSessionId,
                        title: existing?.title || messages[0]?.content.slice(0, 20).replace(/!\[.*?\]\(.*?\)/g, '[图片]') || '新对话',
                        messages: messages,
                        timestamp: Date.now(),
                        createdAt: existing?.createdAt || currentSessionId
                    };
                    try { await idbPutSession(sessionToFlush); console.log('[星月舱] 切换前已 flush 当前会话'); }
                    catch (e) { console.error('[星月舱] 切换前 flush 失败', e); }
                }
                setMessages([]); setAttachments([]); setCurrentSessionId(Date.now().toString());
                if (window.innerWidth < 768) setSidebarOpen(false);
            };

            const loadSession = async (session) => {
                // ★ 先清掉 pending 的节流保存
                if (idbSaveTimerRef.current) {
                    clearTimeout(idbSaveTimerRef.current);
                    idbSaveTimerRef.current = null;
                    pendingSaveSessionRef.current = null;
                }
                // 切换前也 flush 当前正在跑的会话
                if (currentSessionId && currentSessionId !== session.id && messages.length > 0) {
                    const existing = historySessions.find(s => s.id === currentSessionId);
                    const sessionToFlush = {
                        id: currentSessionId,
                        title: existing?.title || messages[0]?.content.slice(0, 20).replace(/!\[.*?\]\(.*?\)/g, '[图片]') || '新对话',
                        messages: messages,
                        timestamp: Date.now(),
                        createdAt: existing?.createdAt || currentSessionId
                    };
                    try { await idbPutSession(sessionToFlush); }
                    catch (e) { console.error('[星月舱] loadSession 前 flush 失败', e); }
                }
                setMessages(session.messages); setCurrentSessionId(session.id); setAttachments([]);
                if (window.innerWidth < 768) setSidebarOpen(false);
            };
            
            // ★ 两步确认删除：第一次点击只进入"待确认"状态，第二次才真删
            const requestDeleteSession = (e, sessionId) => {
                e.stopPropagation();
                setConfirmDeleteSessionId(sessionId);
                // 5秒无操作自动取消，避免一直红着
                setTimeout(() => {
                    setConfirmDeleteSessionId(prev => prev === sessionId ? null : prev);
                }, 5000);
            };
            const cancelDeleteSession = (e) => {
                e.stopPropagation();
                setConfirmDeleteSessionId(null);
            };
            const deleteSession = (e, sessionId) => {
                e.stopPropagation();
                const newSessions = historySessions.filter(s => s.id !== sessionId);
                setHistorySessions(newSessions);

                    const crc32Table = (() => { let c, table = []; for (let n = 0; n < 256; n++) { c = n; for (let k = 0; k < 8; k++) c = c & 1 ? 0xEDB88320 ^ (c >>> 1) : c >>> 1; table[n] = c; } return table; })();

                        lv.setUint16(6, 0x0800, true); // flags (UTF-8)
                        lv.setUint16(8, 0, true); // compression: stored
                        lv.setUint16(10, 0, true); // mod time
                        lv.setUint16(12, 0, true); // mod date
                        lv.setUint32(14, crc, true);
                        lv.setUint32(18, f.data.length, true); // compressed size
                        lv.setUint32(22, f.data.length, true); // uncompressed size
                        lv.setUint16(26, f.name.length, true);
                        lv.setUint16(28, 0, true); // extra length
                        lh.set(f.name, 30);
                        localHeaders.push({ header: lh, data: f.data, offset });
                        
                        // Central directory header
                        const ch = new Uint8Array(46 + f.name.length);
                        const cv = new DataView(ch.buffer);
                        cv.setUint32(0, 0x02014b50, true);
                        cv.setUint16(4, 20, true);
                        cv.setUint16(6, 20, true);
                        cv.setUint16(8, 0x0800, true);
                        cv.setUint16(10, 0, true);
                        cv.setUint16(12, 0, true);
                        cv.setUint16(14, 0, true);
                        cv.setUint32(16, crc, true);
                        cv.setUint32(20, f.data.length, true);
                        cv.setUint32(24, f.data.length, true);
                        cv.setUint16(28, f.name.length, true);
