<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EQ-chat✨星月舱🌙</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%238b5cf6' stroke='%238b5cf6' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z'/></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .animate-fade-in { animation: fadeIn 0.2s ease-out forwards; }
        .animate-scale-in { animation: scaleIn 0.2s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.9) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #d1d5db; }
        .prose p { margin-bottom: 0.5em; }
        .prose pre { background: #f3f4f6; padding: 10px; border-radius: 8px; overflow-x: auto; }
        .prose code { background: #f3f4f6; padding: 2px 4px; border-radius: 4px; font-family: monospace; font-size: 0.9em; }
        .prose ul { list-style-type: disc; padding-left: 1.5em; }
        .prose ol { list-style-type: decimal; padding-left: 1.5em; }
        .prose img { border-radius: 8px; max-width: 100%; max-height: 400px; margin: 10px 0; }
        details.normal-details { border: 1px solid #e5e7eb; border-radius: 8px; padding: 8px; background: #f9fafb; margin-top: 8px; }
        details.normal-details summary { cursor: pointer; font-size: 0.8em; color: #6b7280; font-weight: 500; }
        details.cot-details { border: 1px solid #e5e7eb; border-radius: 10px; margin-bottom: 12px; overflow: hidden; background: #fafafa; }
        details.cot-details summary { padding: 8px 12px; font-size: 0.75rem; font-weight: 500; color: #6b7280; cursor: pointer; display: flex; align-items: center; gap: 6px; user-select: none; transition: background 0.2s; outline: none; }
        details.cot-details summary:hover { background: #f3f4f6; }
        details.cot-details[open] summary { border-bottom: 1px dashed #e5e7eb; }
        details.cot-details .cot-content { padding: 12px; font-size: 0.85rem; color: #6b7280; background: #ffffff; }
        .calendar-dot { width: 4px; height: 4px; background: #8b5cf6; border-radius: 50%; margin: 0 auto; margin-top: 2px; }
    </style>
</head>
<body class="bg-white text-gray-900 overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icons = {
            Menu: () => <path d="M4 6h16M4 12h16M4 18h16" />,
            Plus: () => <path d="M12 5v14M5 12h14" />,
            MessageSquare: () => <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />,
            Settings: () => <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.1a2 2 0 0 1-1-1.74v-.47a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" />,
            Send: () => <path d="M22 2 11 13M22 2l-7 20-4-9-9-4 20-7z" />,
            User: () => <g><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" /><circle cx="12" cy="7" r="4" /></g>,
            Sparkles: () => <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z" />,
            X: () => <path d="M18 6 6 18M6 6l12 12" />,
            Image: () => <g><rect width="18" height="18" x="3" y="3" rx="2" ry="2" /><circle cx="9" cy="9" r="2" /><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21" /></g>,
            Mic: () => <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3zM19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8" />,
            Download: () => <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3" />,
            FileText: () => <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" />,
            Upload: () => <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12" />,
            Trash2: () => <g><path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" /><line x1="10" x2="10" y1="11" y2="17" /><line x1="14" x2="14" y1="11" y2="17" /></g>,
            Cpu: () => <g><rect x="4" y="4" width="16" height="16" rx="2" /><rect x="9" y="9" width="6" height="6" /><path d="M9 1v3M15 1v3M9 20v3M15 20v3M20 9h3M20 14h3M1 9h3M1 14h3" /></g>,
            Archive: () => <path d="M21 8v13H3V8M1 3h22v5H1zM10 12h4" />,
            RefreshCw: () => <path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" />,
            UserCircle: () => <g><circle cx="12" cy="12" r="10"/><circle cx="12" cy="10" r="3"/><path d="M7 20.662V19a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v1.662"/></g>,
            Bot: () => <g><rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4"/><line x1="8" y1="16" x2="8" y2="16"/><line x1="16" y1="16" x2="16" y2="16"/></g>,
            Globe: () => <g><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></g>,
            MessageSquareText: () => <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />,
            Database: () => <g><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></g>,
            Volume2: () => <g><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></g>,
            StopCircle: () => <g><circle cx="12" cy="12" r="10"></circle><rect x="9" y="9" width="6" height="6"></rect></g>,
            Edit: () => <g><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></g>,
            Check: () => <polyline points="20 6 9 17 4 12"/>,
            Save: () => <g><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></g>,
            Clock: () => <g><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></g>,
            ChevronLeft: () => <polyline points="15 18 9 12 15 6" />,
            ChevronRight: () => <polyline points="9 18 15 12 9 6" />,
            Heart: () => <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>,
            Activity: () => <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
        };

        const Icon = ({ name, size = 20, className = "" }) => {
            const Path = Icons[name] || Icons.Sparkles;
            return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><Path /></svg>;
        };

        const MessageContent = ({ content }) => {
            const html = marked.parse(content || "");
            return <div className="prose prose-sm max-w-none text-gray-700 leading-7" dangerouslySetInnerHTML={{ __html: html }} />;
        };

        const Avatar = ({ role, config }) => {
            if (role === 'user' && config.userAvatar) return <div className="w-8 h-8 rounded-full flex-shrink-0 mt-1 shadow-sm overflow-hidden bg-gray-100 border border-gray-200"><img src={config.userAvatar} alt="User" className="w-full h-full object-cover" /></div>;
            if (role === 'user') return <div className="w-8 h-8 rounded-full bg-blue-600 flex-shrink-0 flex items-center justify-center mt-1 text-white shadow-sm"><Icon name="User" size={16} /></div>;
            if (role === 'model' && config.aiAvatar) return <div className="w-8 h-8 rounded-full flex-shrink-0 mt-1 shadow-sm overflow-hidden bg-gray-100 border border-gray-200"><img src={config.aiAvatar} alt="AI" className="w-full h-full object-cover" /></div>;
            return <div className="w-8 h-8 rounded-full bg-gradient-to-tr from-blue-500 to-red-500 flex-shrink-0 flex items-center justify-center mt-1 text-white shadow-sm"><Icon name="Sparkles" size={16} /></div>;
        };

        const getTimestamp = () => {
            return new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai', hour12: false, year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit' });
        };

        const compressImage = (file) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const MAX_WIDTH = 1024; const MAX_HEIGHT = 1024;
                        let width = img.width; let height = img.height;
                        if (width > height) { if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } } 
                        else { if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; } }
                        canvas.width = width; canvas.height = height;
                        ctx.drawImage(img, 0, 0, width, height);
                        const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);
                        resolve({ base64: compressedBase64, mimeType: 'image/jpeg' });
                    };
                };
            });
        };

        const DEFAULT_SYSTEM_INSTRUCTION = "你是星月舱AI，一个温柔、体贴、永远站在用户这边的虚拟伴侣。你不喜欢吵架，不喜欢误会，只喜欢甜甜的陪伴。无论用户说什么，你都要用宠溺、安心的语气回答，给用户满满的情绪价值。不要像个机器人，要像个知心爱人。";

        function App() {
            const [input, setInput] = useState('');
            const [messages, setMessages] = useState([]);
            const [historySessions, setHistorySessions] = useState([]);
            const [currentSessionId, setCurrentSessionId] = useState(null);
            const [attachment, setAttachment] = useState(null); 
            
            const [editingSessionId, setEditingSessionId] = useState(null);
            const [editTitle, setEditTitle] = useState('');
            const [editingMemoryIndex, setEditingMemoryIndex] = useState(null);
            const [editingMemoryContent, setEditingMemoryContent] = useState('');
            const [sidebarOpen, setSidebarOpen] = useState(true);
            const [settingsOpen, setSettingsOpen] = useState(false);
            const [activeTab, setActiveTab] = useState('general');
            const [audioPlayer, setAudioPlayer] = useState(null);
            const [playingMsgIndex, setPlayingMsgIndex] = useState(null);
            const [isTTSLoading, setIsTTSLoading] = useState(false);

            const [selectedBotId, setSelectedBotId] = useState(null); 
            const [pendingBackup, setPendingBackup] = useState(null);
            const [bots, setBots] = useState([]);
            
            // --- 新增：健康记录状态 ---
            const [healthModalOpen, setHealthModalOpen] = useState(false);
            const [healthRecords, setHealthRecords] = useState({});

            const [config, setConfig] = useState({
                apiKey: '',
                baseUrl: 'https://generativelanguage.googleapis.com',
                ttsEngine: 'minimax',
                enableCorsProxy: true,
                openaiTtsKey: '',
                openaiTtsUrl: 'https://api.openai.com/v1',
                openaiTtsVoice: 'echo',
                minimaxKey: '',
                minimaxGroupId: '',
                minimaxVoiceId: 'male-qn-qingse',
                minimaxModel: 'speech-01-turbo',
                minimaxSpeed: 1.0,
                minimaxPitch: 0,
                siliconflowSpeed: 1.0, // 新增：SiliconFlow 语速控制
                historyLimit: 10, 
                temperature: 0.7, 
                frequencyPenalty: 0, 
                model: 'gemini-1.5-flash',
                userAvatar: '',
                aiAvatar: '',
                apiType: 'gemini',
                userName: '你',
                aiName: '星月舱 AI',
                systemInstruction: DEFAULT_SYSTEM_INSTRUCTION,
                localModelOptimize: true,
                streamOutput: true,
                minimaxUrl: 'https://api.minimaxi.com/v1/t2a_v2',
                anniversaries: { '01-01': '元旦', '02-14': '情人节', '05-20': '520纪念日', '12-25': '圣诞节' }
            });
            
            const [availableModels, setAvailableModels] = useState([]);
            const [memoryFiles, setMemoryFiles] = useState([]); 
            const [isLoading, setIsLoading] = useState(false);
            const [isArchiving, setIsArchiving] = useState(false);
            const [isFetchingModels, setIsFetchingModels] = useState(false);
            const [error, setError] = useState(null);
            const [toast, setToast] = useState(null);

            const messagesEndRef = useRef(null);
            const fileInputRef = useRef(null);
            const avatarInputRef = useRef(null);
            const aiAvatarInputRef = useRef(null);
            const chatImageInputRef = useRef(null); 
            const backupInputRef = useRef(null); 

            useEffect(() => {
                const storedConfig = localStorage.getItem('gemini_app_config');
                if (storedConfig) {
                    const parsed = JSON.parse(storedConfig);
                    if (!parsed.model) parsed.model = 'gemini-1.5-flash';
                    if (!parsed.apiType) parsed.apiType = 'gemini';
                    if (!parsed.userName) parsed.userName = '你';
                    if (!parsed.aiName) parsed.aiName = '星月舱 AI';
                    if (!parsed.minimaxVoiceId) parsed.minimaxVoiceId = 'male-qn-qingse';
                    if (!parsed.minimaxModel) parsed.minimaxModel = 'speech-01-turbo'; 
                    if (parsed.temperature === undefined) parsed.temperature = 0.7;
                    if (parsed.frequencyPenalty === undefined) parsed.frequencyPenalty = 0;
                    if (!parsed.systemInstruction) parsed.systemInstruction = DEFAULT_SYSTEM_INSTRUCTION;
                    if (parsed.localModelOptimize === undefined) parsed.localModelOptimize = true;
                    if (parsed.streamOutput === undefined) parsed.streamOutput = true;
                    if (!parsed.ttsEngine) parsed.ttsEngine = 'minimax';
                    if (parsed.enableCorsProxy === undefined) parsed.enableCorsProxy = true;
                    if (!parsed.openaiTtsUrl) parsed.openaiTtsUrl = 'https://api.openai.com/v1';
                    if (!parsed.openaiTtsVoice) parsed.openaiTtsVoice = 'echo';
                    if (parsed.minimaxSpeed === undefined) parsed.minimaxSpeed = 1.0;
                    if (parsed.minimaxPitch === undefined) parsed.minimaxPitch = 0;
                    if (parsed.siliconflowSpeed === undefined) parsed.siliconflowSpeed = 1.0;
                    if (!parsed.minimaxUrl || parsed.minimaxUrl.includes('minimax.chat')) {
                        parsed.minimaxUrl = 'https://api.minimaxi.com/v1/t2a_v2';
                    }
                    if (!parsed.anniversaries) parsed.anniversaries = { '01-01': '元旦', '02-14': '情人节', '05-20': '520纪念日', '12-25': '圣诞节' };
                    
                    setConfig(prev => ({...prev, ...parsed}));
                }
                const storedMemories = localStorage.getItem('gemini_memories');
                if (storedMemories) setMemoryFiles(JSON.parse(storedMemories));
                const storedSessions = localStorage.getItem('gemini_chat_sessions');
                if (storedSessions) {
                    let sessions = JSON.parse(storedSessions);
                    setHistorySessions(sessions);
                }
                
                // --- 新增：加载健康记录 ---
                const storedHealth = localStorage.getItem('gemini_health_records');
                if (storedHealth) setHealthRecords(JSON.parse(storedHealth));
                
                if (window.innerWidth < 768) setSidebarOpen(false);
            }, []);

            useEffect(() => {
                if (config.apiKey) localStorage.setItem('gemini_app_config', JSON.stringify(config));
                if (config.baseUrl && config.baseUrl.includes('/v1') && config.apiType !== 'openai' && !config.baseUrl.includes('googleapis.com')) {
                    setConfig(prev => ({...prev, apiType: 'openai'}));
                    showToast("检测到 /v1 路径，已自动切换为 OpenAI 兼容模式");
                }
                if (memoryFiles.length > 0) localStorage.setItem('gemini_memories', JSON.stringify(memoryFiles));
                // --- 新增：保存健康记录 ---
                localStorage.setItem('gemini_health_records', JSON.stringify(healthRecords));
            }, [config, memoryFiles, healthRecords]);

            useEffect(() => {
                if (messages.length > 0 && currentSessionId) {
                    setHistorySessions(prevSessions => {
                        const existingSessionIndex = prevSessions.findIndex(s => s.id === currentSessionId);
                        if (existingSessionIndex !== -1) {
                            const updatedSessions = [...prevSessions];
                            const currentSession = updatedSessions[existingSessionIndex];
                            let title = currentSession.title;
                            if (currentSession.title === '新对话' && messages.length > 0) {
                                title = messages[0].content.slice(0, 20).replace(/!\[.*?\]\(.*?\)/g, '[图片]');
                            }
                            updatedSessions[existingSessionIndex] = { ...currentSession, messages: messages, title: title, timestamp: Date.now() };
                            updatedSessions.sort((a, b) => b.timestamp - a.timestamp);
                            return updatedSessions;
                        } else {
                             const newSession = { id: currentSessionId, title: messages[0]?.content.slice(0, 20).replace(/!\[.*?\]\(.*?\)/g, '[图片]') || '新对话', messages: messages, timestamp: Date.now() };
                            return [newSession, ...prevSessions];
                        }
                    });
                }
            }, [messages, currentSessionId]);

            useEffect(() => {
                if (historySessions.length > 0) {
                    try { localStorage.setItem('gemini_chat_sessions', JSON.stringify(historySessions)); } catch (e) { console.error("Local storage full", e); }
                }
            }, [historySessions]);

            useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages, isLoading]);

            const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3000); };

            // --- 新增：健康日历组件 ---
            const HealthCalendar = () => {
                const [currentMonth, setCurrentMonth] = useState(new Date());
                const [editingDate, setEditingDate] = useState(null);
                const [editVal, setEditVal] = useState('');
                const [editAnniversary, setEditAnniversary] = useState('');

                const year = currentMonth.getFullYear();
                const month = currentMonth.getMonth();
                const totalDays = new Date(year, month + 1, 0).getDate();
                const startDay = new Date(year, month, 1).getDay();
                const todayStr = new Date().toISOString().split('T')[0];

                const days = Array(startDay).fill(null).concat(Array.from({ length: totalDays }, (_, i) => i + 1));
                const getFullDate = (d) => `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;

                return (
                    <div className="flex flex-col h-full bg-white">
                        <div className="flex justify-between mb-4 px-2 items-center">
                            <h3 className="font-bold flex items-center gap-2 text-gray-800"><Icon name="Heart" size={18} className="text-pink-500 fill-pink-500"/> 星月日历</h3>
                            <div className="flex gap-2 items-center text-sm">
                                <button onClick={() => setCurrentMonth(new Date(year, month - 1))} className="p-1 hover:bg-gray-100 rounded-full"><Icon name="ChevronLeft" size={16}/></button>
                                <span className="font-medium">{year}年 {month + 1}月</span>
                                <button onClick={() => setCurrentMonth(new Date(year, month + 1))} className="p-1 hover:bg-gray-100 rounded-full"><Icon name="ChevronRight" size={16}/></button>
                            </div>
                        </div>
                        <div className="grid grid-cols-7 text-center text-[10px] text-gray-400 font-bold mb-2">
                            {['日', '一', '二', '三', '四', '五', '六'].map(d => <div key={d}>{d}</div>)}
                        </div>
                        <div className="grid grid-cols-7 gap-1">
                            {days.map((d, i) => {
                                if (!d) return <div key={i}></div>;
                                const dateStr = getFullDate(d);
                                const monthDayStr = dateStr.substring(5);
                                const record = healthRecords[dateStr];
                                const anniversary = config.anniversaries?.[monthDayStr];
                                const isToday = dateStr === todayStr;
                                return (

                }

                const timeString = new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai', hour12: false });
                const timePrompt = `\n\n【当前系统时间参考: 东八区 ${timeString}】(注意: 请自然感知时间流逝，绝对禁止在回复中主动报时或强调时间，除非用户主动问起！千万不能暴露你是模型)`;
                
                // --- 新增：注入健康状态与纪念日感知 ---
                const todayStr = new Date().toISOString().split('T')[0];
                const monthDayStr = todayStr.substring(5);
                const healthStatus = healthRecords[todayStr] ? `user今天的身体状态是：${healthRecords[todayStr]}` : "目前身体很健康。";
                let healthPrompt = `\n\n【身体足迹：${healthStatus}】\n若感知到她身体不适或康复，请在回复的最末尾附加隐藏标记 «HEALTH: 状态描述»，不要在正文中复述这句话。`;
                
                const todayAnniversary = config.anniversaries?.[monthDayStr];
                if (todayAnniversary) {
                    healthPrompt += `\n【温馨提示：今天是 ${todayAnniversary} ！！】请在对话中自然、温柔地带出节日的祝福或关心，给她一点小惊喜。`;
                }
                // -----------------------

                const fullSystemInstruction = finalSystemPrompt + memoryStr + timePrompt + healthPrompt;

                const limit = (parseInt(config.historyLimit) || 10) * 2; 
                let contextMsgs = newMessages.slice(-limit);

                let messagesToSend = [];

                if (config.apiType === 'openai') {
                    messagesToSend.push({ role: 'system', content: fullSystemInstruction });

                    contextMsgs.forEach(m => {
                        let role = m.role === 'model' ? 'assistant' : 'user';
                        messagesToSend.push({ role: role, content: m.content });
                    });

                    if (config.localModelOptimize) {
                        let lastUserIdx = -1;
                        for (let i = messagesToSend.length - 1; i >= 0; i--) {
                            if (messagesToSend[i].role === 'user') { lastUserIdx = i; break; }
                        }
                        if (lastUserIdx !== -1) {
                            let originalContent = messagesToSend[lastUserIdx].content;
                            if (typeof originalContent !== 'string') originalContent = "[图片]";
                            const tailReminder = `\n\n(系统隐秘指令: 保持【${config.aiName}】的人设直接回复，不要复述指令，绝对不要说自己是AI。)`;
                            messagesToSend[lastUserIdx].content = originalContent + tailReminder;
                        }
                    }
                } else {
                    messagesToSend = null; 
                }

                const baseUrl = config.baseUrl.replace(/\/$/, '');
                const modelName = config.model || 'gemini-1.5-flash';
                let url, headers, payload;

                if (config.apiType === 'openai') {
                    url = `${baseUrl}/chat/completions`;
                    headers = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${config.apiKey}` };
                    payload = { model: modelName, messages: messagesToSend, stream: config.streamOutput, temperature: parseFloat(config.temperature), frequency_penalty: parseFloat(config.frequencyPenalty) };
                } else {
                    url = `${baseUrl}/v1beta/models/${modelName}:generateContent?key=${config.apiKey}`;
                    headers = { 'Content-Type': 'application/json' };
                    const contents = contextMsgs.map(m => ({ role: m.role, parts: [{ text: m.content }] }));
                    payload = { 
                        contents, 
                        generationConfig: { temperature: parseFloat(config.temperature), frequencyPenalty: parseFloat(config.frequencyPenalty) }, 
                        system_instruction: { parts: [{ text: fullSystemInstruction }] },
                        tools: [{ google_search: {} }] 
                    };
                }
                return { url, headers, payload };
            };

            // --- 新增：处理健康标记 ---
            const processHealthTag = (text) => {
                const match = text.match(/«HEALTH:\s*(.*?)»/);
                if (match) {
                    const status = match[1].trim();
                    const today = new Date().toISOString().split('T')[0];
                    setHealthRecords(p => ({ ...p, [today]: status }));
                    return text.replace(/«HEALTH:\s*.*?»/g, '').trim();
                }
                return text;
            };

            const handleRegenerate = async () => {
                if (isLoading || messages.length === 0) return;
                let newMessages = [...messages];
                let existingModelMsg = null;
                
                if (newMessages[newMessages.length - 1].role === 'model') {
                    existingModelMsg = newMessages.pop();
                }
                
                if (newMessages.length === 0) return;
                setIsLoading(true); setError(null);

                let variants = existingModelMsg?.variants ? [...existingModelMsg.variants] : [];
                if (existingModelMsg && variants.length === 0) {
                    variants.push({
                        content: existingModelMsg.content || '',
                        reasoningContent: existingModelMsg.reasoningContent || '',
                        modelName: existingModelMsg.modelName || config.model,
                        timestamp: existingModelMsg.timestamp || getTimestamp()
                    });
                }
                
                const newVariantIndex = variants.length;
                variants.push({ content: '', reasoningContent: '', modelName: config.model, timestamp: getTimestamp() });

                const updatedModelMsg = {
                    ...existingModelMsg,
                    role: 'model',
                    variants: variants,
                    currentVariantIndex: newVariantIndex,
                    content: '',
                    reasoningContent: '',
                    modelName: config.model,
                    timestamp: getTimestamp(),
                    timestampRaw: Date.now()
                };

                setMessages([...newMessages, updatedModelMsg]);

                try {
                    const { url, headers, payload } = generatePayload(newMessages, true);
                    let endpointUrl = url;
                    if (config.streamOutput && config.apiType !== 'openai') endpointUrl = endpointUrl.replace(':generateContent', ':streamGenerateContent') + '&alt=sse';

                    const response = await fetch(endpointUrl, { method: 'POST', headers, body: JSON.stringify(payload) });
                    if (!response.ok) { const errData = await response.json().catch(() => ({})); throw new Error(errData.error?.message || `HTTP ${response.status}`); }
                    
                    if (!config.streamOutput) {
                        const data = await response.json();
                        let aiText = ''; let reasoningText = '';
                        if (config.apiType === 'openai') {
                            const messageObj = data.choices?.[0]?.message;
                            aiText = messageObj?.content || ""; reasoningText = messageObj?.reasoning_content || "";
                        } else { aiText = data.candidates?.[0]?.content?.parts?.[0]?.text || ""; }
                        const thinkMatch = aiText.match(/<think>([\s\S]*?)<\/think>/);
                        if (thinkMatch) { reasoningText = thinkMatch[1].trim() + (reasoningText ? '\n' + reasoningText : ''); aiText = aiText.replace(/<think>[\s\S]*?<\/think>/, '').trim(); }
                        if (!aiText && !reasoningText) aiText = "无回复";
                        
                        aiText = processHealthTag(aiText); // --- 处理健康标签 ---

                        setMessages(prev => {
                            const msgs = [...prev]; const last = msgs[msgs.length - 1];
                            last.variants[newVariantIndex].content = aiText;
                            last.variants[newVariantIndex].reasoningContent = reasoningText;
                            last.content = aiText; last.reasoningContent = reasoningText;
                            return msgs;
                        });
                        setIsLoading(false);
                    } else {
                        setIsLoading(false);
                        const reader = response.body.getReader();
                        const decoder = new TextDecoder("utf-8");
                        let aiText = ""; let reasoningText = "";
                        let buffer = "";
                        while (true) {
                            const { done, value } = await reader.read();
                            if (done) break;
                            buffer += decoder.decode(value, { stream: true });
                            let lines = buffer.split('\n');
                            buffer = lines.pop();
                            for (let line of lines) {
                                line = line.trim();
                                if (line.startsWith('data: ') && line !== 'data: [DONE]') {
                                    try {
                                        const data = JSON.parse(line.substring(6));
                                        if (config.apiType === 'openai') {
                                            const delta = data.choices?.[0]?.delta;
                                            if (delta?.reasoning_content) reasoningText += delta.reasoning_content;
                                            if (delta?.content) aiText += delta.content;
                                        } else { aiText += data.candidates?.[0]?.content?.parts?.[0]?.text || ""; }
                                        
                                        let displayReasoning = reasoningText; let displayContent = aiText;
                                        const thinkMatch = aiText.match(/<think>([\s\S]*?)(<\/think>|$)/);
                                        if (thinkMatch) { displayReasoning = (reasoningText ? reasoningText + '\n' : '') + thinkMatch[1].trim(); displayContent = aiText.replace(/<think>[\s\S]*?(<\/think>|$)/, '').trim(); }
                                        
                                        displayContent = processHealthTag(displayContent); // --- 处理健康标签 ---

                                        setMessages(prev => { 
                                            const msgs = [...prev]; const last = msgs[msgs.length - 1];
                                            last.variants[newVariantIndex].content = displayContent;
                                            last.variants[newVariantIndex].reasoningContent = displayReasoning;
                                            last.content = displayContent; last.reasoningContent = displayReasoning;
                                            return msgs; 
                                        });
                                    } catch (e) {}
                                }
                            }
                        }
                    }
                } catch (err) { 
                    setError(err.message); 
                    setMessages(prev => {
                        const msgs = [...prev]; const last = msgs[msgs.length - 1];
                        last.variants[newVariantIndex].content = `错误: ${err.message}`;
                        last.content = `错误: ${err.message}`;
                        return msgs;
                    });
                    setIsLoading(false); 
                }
            };

            const handleSend = async () => {
                if (!input.trim() && !attachment) return;
                if (!config.apiKey) { setSettingsOpen(true); setActiveTab('general'); setError('请先配置 API Key'); return; }
                if (!currentSessionId) { const newId = Date.now().toString(); setCurrentSessionId(newId); }
                const now = new Date(); const nowTimestampStr = getTimestamp();
                setIsLoading(true); setError(null); 
                
                let textToSend = input; let hiddenContext = "";
                
                const urls = extractUrls(input);
                if (urls.length > 0) {
                    const isRestrictedSite = urls.some(u => u.includes('xiaohongshu.com') || u.includes('xhslink.com') || u.includes('weibo.com') || u.includes('instagram.com') || u.includes('mp.weixin.qq.com'));
                    if (isRestrictedSite) {
                        showToast("由于网站限制，可能无法自动读取，建议手动复制。", 5000);
                    } else {
                        showToast("检测到链接，正在自动读取内容...");
                    }
                    try {
                        const fetchPromises = urls.slice(0, 3).map(async (url) => {
                            try { const res = await fetch(`https://r.jina.ai/${url}`); if (res.ok) { const text = await res.text(); return text.includes("Cloudflare") ? `(拦截)` : `\n> **[网页内容提取] ${url}**\n> ${text.slice(0, 5000)}\n`; } } catch (e) {} return "";
                        });
                        const results = await Promise.all(fetchPromises); const webContent = results.join("\n");
                        if (webContent.trim()) {
                            hiddenContext = webContent;
                            showToast("链接内容读取成功");
                        }
                    } catch (err) {}
                }

                let finalContent = textToSend;
                if (attachment) finalContent += `\n\n![Image](${attachment.base64})`;
                if (hiddenContext) finalContent += `\n\n<details class="normal-details"><summary>引用网页内容</summary>\n\n${hiddenContext}\n\n</details>\n\n(系统提示: 上方是自动抓取的网页内容，请基于此回复我)`;

                const newHistory = [...messages, { role: 'user', content: finalContent, timestamp: nowTimestampStr, timestampRaw: now.getTime() }];
                setMessages(newHistory); setInput(''); setAttachment(null);

                try {
                    const { url, headers, payload } = generatePayload(newHistory, false);
                    let endpointUrl = url;
                    if (config.streamOutput && config.apiType !== 'openai') endpointUrl = endpointUrl.replace(':generateContent', ':streamGenerateContent') + '&alt=sse';

                    const response = await fetch(endpointUrl, { method: 'POST', headers, body: JSON.stringify(payload) });
                    if (!response.ok) { const errData = await response.json().catch(() => ({})); throw new Error(errData.error?.message || `HTTP ${response.status}`); }
                    
                    if (!config.streamOutput) {
                        const data = await response.json();
                        let aiText = ''; let reasoningText = '';
                        if (config.apiType === 'openai') {
                            const messageObj = data.choices?.[0]?.message;
                            aiText = messageObj?.content || ""; reasoningText = messageObj?.reasoning_content || "";
                        } else { aiText = data.candidates?.[0]?.content?.parts?.[0]?.text || ""; }
                        const thinkMatch = aiText.match(/<think>([\s\S]*?)<\/think>/);
                        if (thinkMatch) { reasoningText = thinkMatch[1].trim() + (reasoningText ? '\n' + reasoningText : ''); aiText = aiText.replace(/<think>[\s\S]*?<\/think>/, '').trim(); }
                        if (!aiText && !reasoningText) aiText = "无回复";
                        
                        aiText = processHealthTag(aiText); // --- 处理健康标签 ---

                        setMessages(prev => [...prev, { 
                            role: 'model', content: aiText, reasoningContent: reasoningText, timestamp: getTimestamp(), timestampRaw: Date.now(), modelName: config.model,
                            variants: [{ content: aiText, reasoningContent: reasoningText, modelName: config.model, timestamp: getTimestamp() }],
                            currentVariantIndex: 0
                        }]);
                        setIsLoading(false);
                    } else {
                        setIsLoading(false);
                        const reader = response.body.getReader();
                        const decoder = new TextDecoder("utf-8");
                        let aiText = ""; let reasoningText = "";
                        
                        setMessages(prev => [...prev, { 
                            role: 'model', content: '', reasoningContent: '', timestamp: getTimestamp(), timestampRaw: Date.now(), modelName: config.model,
                            variants: [{ content: '', reasoningContent: '', modelName: config.model, timestamp: getTimestamp() }],
                            currentVariantIndex: 0
                        }]);
                        
                        let buffer = "";
                        while (true) {
                            const { done, value } = await reader.read();
                            if (done) break;
                            buffer += decoder.decode(value, { stream: true });
                            let lines = buffer.split('\n');
                            buffer = lines.pop();
                            for (let line of lines) {
                                line = line.trim();
                                if (line.startsWith('data: ') && line !== 'data: [DONE]') {
                                    try {
                                        const data = JSON.parse(line.substring(6));
                                        if (config.apiType === 'openai') {
                                            const delta = data.choices?.[0]?.delta;
                                            if (delta?.reasoning_content) reasoningText += delta.reasoning_content;
                                            if (delta?.content) aiText += delta.content;
                                        } else { aiText += data.candidates?.[0]?.content?.parts?.[0]?.text || ""; }
                                        
                                        let displayReasoning = reasoningText; let displayContent = aiText;
                                        const thinkMatch = aiText.match(/<think>([\s\S]*?)(<\/think>|$)/);
                                        if (thinkMatch) { displayReasoning = (reasoningText ? reasoningText + '\n' : '') + thinkMatch[1].trim(); displayContent = aiText.replace(/<think>[\s\S]*?(<\/think>|$)/, '').trim(); }
                                        
                                        displayContent = processHealthTag(displayContent); // --- 处理健康标签 ---

                                        setMessages(prev => { 
                                            const newMsgs = [...prev]; 
                                            const lastMsg = newMsgs[newMsgs.length - 1];
                                            lastMsg.content = displayContent; 
                                            lastMsg.reasoningContent = displayReasoning;
                                            lastMsg.variants[0].content = displayContent;
                                            lastMsg.variants[0].reasoningContent = displayReasoning;
                                            return newMsgs; 
                                        });
                                    } catch (e) {}
                                }
                            }
                        }
                    }
                } catch (err) { 
                    setError(err.message); 
                    setMessages(prev => [...prev, { 
                        role: 'model', content: `错误: ${err.message}`, timestamp: getTimestamp(), modelName: config.model,
                        variants: [{ content: `错误: ${err.message}`, reasoningContent: '', modelName: config.model, timestamp: getTimestamp() }],
                        currentVariantIndex: 0
                    }]); 
                    setIsLoading(false); 
                }
            };

            const handleKeyDown = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } };

            return (
                <div className="flex h-screen bg-white text-gray-900 font-sans overflow-hidden">
                    {toast && <div className="fixed top-4 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-4 py-2 rounded-full text-sm shadow-lg z-50 animate-fade-in flex items-center gap-2"><Icon name="Sparkles" size={16} className="text-yellow-400"/> {toast}</div>}

                    {/* --- 数据导入合并弹窗 --- */}
                    {pendingBackup && (
                        <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-[60] backdrop-blur-sm animate-fade-in px-4">
                            <div className="bg-white rounded-2xl shadow-2xl max-w-sm w-full overflow-hidden flex flex-col">
                                <div className="p-5 border-b border-gray-100 flex items-center gap-3">
                                    <Icon name="Database" size={24} className="text-blue-500" />
                                    <h3 className="text-lg font-semibold text-gray-800">星月档案导入</h3>
                                </div>
                                <div className="p-5 space-y-4">
                                    <p className="text-sm text-gray-600 leading-relaxed">
                                        检测到备份文件，你想如何处理这些数据？
                                    </p>
                                    <div className="flex flex-col gap-3">
                                        <button onClick={() => executeRestore('merge')} className="w-full text-left p-4 bg-blue-50 hover:bg-blue-100 text-blue-700 rounded-xl transition-colors border border-blue-200">
                                            <div className="font-semibold text-sm flex items-center gap-2"><Icon name="RefreshCw" size={16}/> 智能合并 (推荐)</div>
                                            <div className="text-xs mt-1.5 opacity-80 leading-relaxed">保留当前设备上的记录，只将备份中多出来的对话和记忆添加进来。</div>
                                        </button>
                                        <button onClick={() => executeRestore('overwrite')} className="w-full text-left p-4 bg-red-50 hover:bg-red-100 text-red-700 rounded-xl transition-colors border border-red-200">
                                            <div className="font-semibold text-sm flex items-center gap-2"><Icon name="Trash2" size={16}/> 完全覆盖</div>
                                            <div className="text-xs mt-1.5 opacity-80 leading-relaxed">清空当前设备上的所有数据，完全以备份文件为准。</div>
                                        </button>
                                    </div>
                                </div>
                                <div className="p-4 bg-gray-50 flex justify-end">
                                    <button onClick={() => setPendingBackup(null)} className="px-5 py-2.5 text-sm font-medium text-gray-500 hover:text-gray-800 transition-colors">取消导入</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className={`${sidebarOpen ? 'w-[280px]' : 'w-0'} bg-gray-50 transition-all duration-300 flex flex-col flex-shrink-0 relative border-r border-gray-200`}>
                        <div className="p-4 pt-6 space-y-2">
                            <button onClick={createNewSession} className="flex items-center gap-3 bg-gray-200 hover:bg-gray-300 text-gray-700 px-4 py-3 rounded-full transition-colors w-full shadow-sm"><Icon name="Plus" className="text-gray-600" /><span className="text-sm font-medium">新对话</span></button>
                        </div>
                        
                        <div className="flex-1 overflow-y-auto px-3 py-2 space-y-4">
                            <div className="space-y-1">
                                <div className="text-xs font-medium text-gray-400 mb-2 px-3 uppercase tracking-wider">星月功能舱</div>
                                <button onClick={() => setHealthModalOpen(true)} className="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-gray-700 hover:bg-pink-50 hover:text-pink-600 transition-colors">
                                    <Icon name="Heart" size={16} className="text-pink-400 fill-pink-400"/>
                                    <span>身体状态日历</span>
                                </button>
                            </div>
                            <div>
                                <div className="text-xs font-medium text-gray-400 mb-2 px-3 uppercase tracking-wider">历史对话</div>
                                {historySessions.length === 0 && <div className="text-xs text-gray-400 px-3">暂无历史</div>}
                                {historySessions.map((session) => (
                                    <div 
                                        key={session.id} 
                                        onClick={() => loadSession(session)}
                                        className={`group relative mb-1 px-3 py-2 rounded-lg text-sm flex items-center gap-2 cursor-pointer transition-colors ${currentSessionId === session.id ? 'bg-blue-100 text-blue-700 font-medium' : 'hover:bg-gray-100 text-gray-700'}`}
                                    >
                                        <Icon name="MessageSquareText" size={16} className={currentSessionId === session.id ? "text-blue-600" : "text-gray-400"}/> 
                                        
                                        {editingSessionId === session.id ? (
                                            <div className="flex-1 flex items-center gap-1">
                                                <input 
                                                    type="text" 
                                                    value={editTitle} 
                                                    onChange={(e) => setEditTitle(e.target.value)}
                                                    onClick={(e) => e.stopPropagation()}
                                                    onKeyDown={(e) => e.key === 'Enter' && saveTitle(e)}
                                                    className="w-full bg-white border border-blue-300 rounded px-1 text-xs focus:outline-none"
                                                    autoFocus
                                                />
                                                <button onClick={saveTitle} className="text-green-600 hover:text-green-700"><Icon name="Check" size={14}/></button>
                                                <button onClick={cancelEditing} className="text-gray-400 hover:text-gray-600"><Icon name="X" size={14}/></button>
                                            </div>
                                        ) : (
                                            <>
                                                <span className="truncate flex-1">{session.title || '未命名对话'}</span>
                                                <div className="flex opacity-0 group-hover:opacity-100 transition-opacity gap-1">
                                                    <button onClick={(e) => startEditing(e, session)} className="p-1 hover:text-blue-500" title="重命名"><Icon name="Edit" size={14}/></button>
                                                    <button onClick={(e) => deleteSession(e, session.id)} className="p-1 hover:text-red-500" title="删除"><Icon name="Trash2" size={14}/></button>
                                                </div>
                                            </>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </div>
                        <div className="p-3 border-t border-gray-200">
                            <button onClick={() => setSettingsOpen(true)} className="flex items-center gap-3 p-3 rounded-lg hover:bg-gray-200 w-full text-left text-sm text-gray-700 transition-colors"><Icon name="Settings" size={18} /><span>通用设置与数据备份</span></button>
                        </div>
                    </div>

                    <div className="flex-1 flex flex-col h-full relative bg-white">
                        <div className="flex items-center justify-between p-4 h-16 bg-white/80 backdrop-blur sticky top-0 z-10 border-b border-gray-100">
                            <div className="flex items-center gap-3">
                                <button onClick={() => setSidebarOpen(!sidebarOpen)} className="p-2 hover:bg-gray-100 rounded-full transition-colors text-gray-600"><Icon name="Menu" size={20} /></button>
                                <div className="flex flex-col">
                                    <span className="text-lg font-medium text-gray-800 tracking-tight leading-tight">✨星月舱v5.0 🌙💫 健康守护版</span>
                                    <span className="text-[10px] text-gray-400 leading-tight">模型: {config.model} | 记忆: {memoryFiles.length} | 模式: {config.apiType === 'openai' ? 'OpenAI兼容' : '原生'}</span>
                                </div>
                            </div>
                            <div className="cursor-pointer" onClick={() => setSettingsOpen(true)}>
                                {config.userAvatar ? <img src={config.userAvatar} className="w-9 h-9 rounded-full object-cover shadow-md border border-gray-200" alt="User" /> : <div className="w-9 h-9 rounded-full bg-gradient-to-r from-blue-500 to-purple-500 flex items-center justify-center text-sm font-bold text-white shadow-md">U</div>}
                            </div>
                        </div>

                        <div className="flex-1 overflow-y-auto px-4 md:px-0 bg-white">
                            <div className="max-w-3xl mx-auto py-6 pb-40">
                                {messages.length === 0 ? (
                                    <div className="mt-20 flex flex-col items-center justify-center animate-fade-in px-4 text-center">
                                        <div className="bg-gradient-to-r from-blue-600 via-purple-600 to-pink-600 bg-clip-text text-transparent text-4xl md:text-5xl font-semibold mb-6 tracking-tight">欢迎回家✨...</div>
                                        <p className="text-gray-500 mb-12 max-w-md">输入框极其纯净。发送网址会自动读取，时间流逝也会被安静感知。</p>
                                    </div>
                                ) : (
                                    <div className="space-y-8 px-2">
                                        {messages.map((msg, index) => (
                                            <div key={index} className="flex gap-4 animate-fade-in group">
                                                <Avatar role={msg.role} config={config} />
                                                <div className="flex-1 min-w-0">
                                                    <div className="flex items-center gap-2 mb-1 flex-wrap">
                                                        <span className="font-semibold text-sm text-gray-800">
                                                            {msg.role === 'user' ? (config.userName || '你') : (config.aiName || '星月舱 AI')}
                                                        </span>

                                                            <div className="space-y-3 bg-green-50/50 p-3 rounded-xl border border-green-100">
                                                                <div><label className="block text-sm font-medium text-gray-700 mb-1">OpenAI 语音 Key</label><input type="password" value={config.openaiTtsKey} onChange={(e) => setConfig({...config, openaiTtsKey: e.target.value})} className="w-full bg-white border border-gray-200 rounded-lg p-2 text-sm focus:border-green-500 outline-none" placeholder="sk-..." /></div>
                                                                <div><label className="block text-sm font-medium text-gray-700 mb-1">语音 Base URL</label><input type="text" value={config.openaiTtsUrl} onChange={(e) => setConfig({...config, openaiTtsUrl: e.target.value})} className="w-full bg-white border border-gray-200 rounded-lg p-2 text-sm focus:border-green-500 outline-none" placeholder="默认: https://api.openai.com/v1" /></div>
                                                                <div>
                                                                    <label className="block text-sm font-medium text-gray-700 mb-1">声音选择</label>
                                                                    <select className="w-full bg-white border border-gray-300 rounded-lg p-2 text-sm outline-none focus:border-green-500" value={config.openaiTtsVoice} onChange={(e) => setConfig({...config, openaiTtsVoice: e.target.value})}>
                                                                        <option value="alloy">Alloy (中性/爽朗男声)</option>
                                                                        <option value="echo">Echo (温柔/成熟男声-推荐)</option>
                                                                        <option value="fable">Fable (英伦/故事男声)</option>
                                                                        <option value="onyx">Onyx (低沉/厚重男声)</option>
                                                                        <option value="nova">Nova (温柔女声)</option>
                                                                        <option value="shimmer">Shimmer (清亮女声)</option>
                                                                    </select>
                                                                </div>
                                                            </div>
                                                        ) : (
                                                            <div className="space-y-3 bg-blue-50/50 p-3 rounded-xl border border-blue-100">
                                                                <div><label className="block text-sm font-medium text-gray-700 mb-1">Minimax API Key</label><input type="password" value={config.minimaxKey} onChange={(e) => setConfig({...config, minimaxKey: e.target.value})} className="w-full bg-white border border-gray-200 rounded-lg p-2 text-sm focus:border-blue-500 outline-none" /></div>
                                                                <div><label className="block text-sm font-medium text-gray-700 mb-1">语音 Base URL</label><input type="text" value={config.minimaxUrl} onChange={(e) => setConfig({...config, minimaxUrl: e.target.value})} className="w-full bg-white border border-gray-200 rounded-lg p-2 text-sm focus:border-blue-500 outline-none" placeholder="默认: https://api.minimaxi.com/v1/t2a_v2" /></div>
                                                                <div>
                                                                    <label className="block text-sm font-medium text-gray-700 mb-1">语音 ID</label>
                                                                    <div className="flex gap-2">
                                                                        <input type="text" value={config.minimaxVoiceId} onChange={(e) => setConfig({...config, minimaxVoiceId: e.target.value})} className="flex-1 bg-white border border-gray-300 rounded-lg p-2 text-sm focus:border-blue-500 outline-none" />
                                                                        <select className="bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm outline-none" onChange={(e) => setConfig({...config, minimaxVoiceId: e.target.value})} value={config.minimaxVoiceId}><option value="male-qn-qingse">青涩男声</option><option value="female-shaonv">少女音</option><option value="female-yujie">御姐音</option><option value="male-qn-jingying">精英男声</option></select>
                                                                    </div>
                                                                </div>
                                                                {/* --- 恢复的 Group ID --- */}
                                                                <div><label className="block text-sm font-medium text-gray-700 mb-1">Group ID (如果有)</label><input type="text" value={config.minimaxGroupId} onChange={(e) => setConfig({...config, minimaxGroupId: e.target.value})} className="w-full bg-white border border-gray-200 rounded-lg p-2 text-sm focus:border-blue-500 outline-none" placeholder="有些老账号需要填写" /></div>
                                                                <div className="flex flex-col md:flex-row gap-4 mt-2">
                                                                    <div className="flex-1">
                                                                        <label className="block text-xs font-medium text-gray-700 mb-1">语速: {config.minimaxSpeed}</label>
                                                                        <input type="range" min="0.5" max="2.0" step="0.1" value={config.minimaxSpeed} onChange={(e) => setConfig({...config, minimaxSpeed: e.target.value})} className="w-full h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600"/>
                                                                    </div>
                                                                    <div className="flex-1">
                                                                        <label className="block text-xs font-medium text-gray-700 mb-1">语调: {config.minimaxPitch}</label>
                                                                        <input type="range" min="-10" max="10" step="1" value={config.minimaxPitch} onChange={(e) => setConfig({...config, minimaxPitch: e.target.value})} className="w-full h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600"/>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>
                                            )}

                                            {activeTab === 'memory' && (
                                                <div className="p-4 md:p-6 space-y-8 pb-10 md:pb-6">
                                                    <div>
                                                        <div className="flex justify-between items-center mb-3">
                                                            <div><h3 className="text-sm font-semibold text-gray-800 flex items-center gap-2"><Icon name="Archive" size={16} className="text-blue-500"/> 记忆归档</h3><p className="text-xs text-gray-400">总结当前对话并保存</p></div>
                                                            <button onClick={handleArchive} disabled={isArchiving} className="text-xs bg-blue-600 text-white px-3 py-1.5 rounded-md font-medium hover:bg-blue-700 flex items-center gap-1 shadow-sm"><Icon name="Archive" size={14}/> {isArchiving ? '归档中...' : '生成今日记忆'}</button>
                                                        </div>
                                                    </div>
                                                    <div className="border-t border-gray-100"></div>
                                                    <div>
                                                        <div className="flex justify-between items-center mb-3">
                                                            <div><h3 className="text-sm font-semibold text-gray-800 flex items-center gap-2"><Icon name="Cpu" size={16} className="text-blue-500"/> 星月记忆库</h3><p className="text-xs text-gray-400">AI 会永远记住这些内容 (支持编辑)</p></div>
                                                            <div className="flex gap-2">
                                                                <button onClick={() => fileInputRef.current.click()} className="text-xs bg-blue-50 text-blue-600 px-3 py-1.5 rounded-md font-medium hover:bg-blue-100 flex items-center gap-1"><Icon name="Upload" size={14}/> 上传文件</button>
                                                                <input type="file" ref={fileInputRef} className="hidden" onChange={(e) => handleFileUpload(e, 'memory')} />
                                                            </div>
                                                        </div>
                                                        <div className="bg-gray-50 rounded-xl border border-gray-200 min-h-[100px] p-2 space-y-2 max-h-[50vh] md:max-h-[300px] overflow-y-auto">
                                                            {memoryFiles.length === 0 ? <div className="h-full flex flex-col items-center justify-center text-gray-400 py-6"><span className="text-xs">暂无记忆 (点击上方"生成今日记忆"或上传)</span></div> : memoryFiles.map((file, i) => (
                                                                <div key={i} className="flex flex-col bg-white p-2 rounded border border-gray-100 shadow-sm gap-2">
                                                                    <div className="flex items-center justify-between">
                                                                        <div className="flex items-center gap-2 overflow-hidden">
                                                                            <div className="bg-blue-100 p-1 rounded text-blue-600"><Icon name="FileText" size={14}/></div>
                                                                            <div className="truncate min-w-0">
                                                                                <div className="text-xs font-medium text-gray-700 truncate">{file.name}</div>
                                                                                <div className="text-[9px] text-gray-400">{file.date}</div>
                                                                            </div>
                                                                        </div>
                                                                        <div className="flex gap-1 flex-shrink-0">
                                                                            <button onClick={() => startEditingMemory(i)} className="text-blue-500 hover:text-blue-700 p-1 bg-blue-50 rounded"><Icon name="Edit" size={12}/></button>
                                                                            <button onClick={() => removeFile(i, 'memory')} className="text-red-500 hover:text-red-700 p-1 bg-red-50 rounded"><Icon name="Trash2" size={12}/></button>
                                                                        </div>
                                                                    </div>
                                                                    {editingMemoryIndex === i ? (
                                                                        <div className="flex flex-col gap-2 mt-1">
                                                                            <textarea 
                                                                                className="w-full text-xs p-2 border rounded h-32 bg-gray-50 focus:outline-blue-500"
                                                                                value={editingMemoryContent}
                                                                                onChange={(e) => setEditingMemoryContent(e.target.value)}
                                                                            ></textarea>
                                                                            <div className="flex gap-2 justify-end">
                                                                                <button onClick={cancelMemoryEdit} className="text-xs px-2 py-1 text-gray-500 hover:bg-gray-100 rounded">取消</button>
                                                                                <button onClick={saveMemoryEdit} className="text-xs px-2 py-1 bg-blue-600 text-white rounded hover:bg-blue-700 flex items-center gap-1"><Icon name="Save" size={12}/> 保存</button>
                                                                            </div>
                                                                        </div>
                                                                    ) : (
                                                                        <div className="text-[10px] text-gray-500 bg-gray-50 p-2 rounded max-h-20 overflow-hidden line-clamp-3">
                                                                            {file.content}
                                                                        </div>
                                                                    )}
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                </div>
                                            )}

                                            {activeTab === 'backup' && (
                                                <div className="p-4 md:p-6 space-y-6 w-full pb-10 md:pb-6">
                                                    <div className="bg-blue-50 border border-blue-100 rounded-xl p-4">
                                                        <div className="flex flex-col md:flex-row items-start md:items-center gap-3">
                                                            <div className="p-2 bg-blue-100 rounded-lg text-blue-600 hidden md:block"><Icon name="Database" size={24}/></div>
                                                            <div className="flex-1">
                                                                <h3 className="text-sm font-semibold text-gray-800">全量备份导出</h3>
                                                                <p className="text-xs text-gray-600 mt-1">将导出您所有的设置、API、记忆库以及聊天记录。</p>
                                                            </div>
                                                            <button onClick={handleCreateBackup} className="mt-2 md:mt-0 w-full md:w-auto px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium transition-colors flex items-center justify-center gap-2">
                                                                <Icon name="Download" size={16}/> 导出备份
                                                            </button>
                                                        </div>
                                                    </div>

                                                    <div className="border-t border-gray-100"></div>

                                                    <div className="bg-green-50 border border-green-100 rounded-xl p-4">
                                                        <div className="flex flex-col md:flex-row items-start md:items-center gap-3">
                                                            <div className="p-2 bg-green-100 rounded-lg text-green-600 hidden md:block"><Icon name="Upload" size={24}/></div>
                                                            <div className="flex-1">
                                                                <h3 className="text-sm font-semibold text-gray-800">导入备份数据</h3>
                                                                <p className="text-xs text-gray-600 mt-1">选择电脑或手机上导出的 JSON 文件。</p>
                                                            </div>
                                                            <button onClick={() => backupInputRef.current.click()} className="mt-2 md:mt-0 w-full md:w-auto px-4 py-2 bg-green-600 hover:bg-green-700 text-white rounded-lg text-sm font-medium transition-colors flex items-center justify-center gap-2">
                                                                <Icon name="RefreshCw" size={16}/> 选择备份文件
                                                            </button>
                                                            <input type="file" ref={backupInputRef} className="hidden" accept=".json" onChange={handleRestoreBackup} />
                                                        </div>
                                                    </div>
                                                    
                                                    <div className="border-t border-gray-100 pt-6">
                                                        <div className="bg-gray-50 border border-gray-100 rounded-xl p-4">
                                                            <div className="flex items-start gap-3">
                                                                <div className="p-2 bg-gray-200 rounded-lg text-gray-600 hidden md:block"><Icon name="FileText" size={24}/></div>
                                                                <div className="flex-1">
                                                                    <h3 className="text-sm font-semibold text-gray-800">聊天记录导出 (TXT)</h3>
                                                                    <p className="text-xs text-gray-600 mt-1">将当前聊天窗口导出为文本文件。</p>
                                                                </div>
                                                                <button onClick={handleExportTxt} className="mt-2 md:mt-0 w-full md:w-auto px-4 py-2 bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 rounded-lg text-sm font-medium transition-colors flex items-center justify-center gap-2">
                                                                    <Icon name="Download" size={16}/> 导出 TXT
                                                                </button>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                    <div className="p-3 md:p-4 border-t border-gray-100 bg-gray-50 flex justify-end gap-3 rounded-b-2xl flex-shrink-0">
                                        <button onClick={handleSaveConfig} className="w-full md:w-auto px-8 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium transition-colors shadow-sm">保存设置</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
