        const compressImage = (file) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const MAX_WIDTH = 1024; const MAX_HEIGHT = 1024;
                        let width = img.width; let height = img.height;
                        if (width > height) { if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } } 
                        else { if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; } }
                        canvas.width = width; canvas.height = height;
                        ctx.drawImage(img, 0, 0, width, height);
                        const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);
                        resolve({ base64: compressedBase64, mimeType: 'image/jpeg' });
                    };
                };
            });
        };

            const handleCompressMemories = async () => {

                setCompressingText('');

                try {
                    // 极致压缩与强力去冗余
                    const allMemoriesText = memoryFiles.map(f => {
                        let contentStr = f.content || '';
                        let cleanText = contentStr
                            .replace(/!\[.*?\]\(.*?\)/g, '[图片]')
                            .replace(/<details.*?<\/details>/g, '')
                            .replace(/<[^>]*>/g, '')
                            .substring(0, 2000); 
                            
                        return `[时间：${f.date}]\n${cleanText}`;
                    }).join("\n\n");
                    
                    const compressPrompt = `你现在正在进行大脑的“记忆凝固”过程（类似于遗忘曲线和长期记忆重组）。\n请阅读以下我们过去所有的日记和历史归档。\n请进行以下处理：\n1. 提取并保留所有关于用户（${config.userName || '用户'}）的核心事实：喜好、习惯、身体状况、重要约定、性格特点。\n2. 提取我们之间最深刻的情感转折和具有纪念意义的重要经历。\n3. 忘掉（删除）寒暄、重复的问候、没有信息量的废话。\n4. 请以第一人称（我）写下这篇“长期灵魂记忆”，语气要极度温柔、深情，把你看到这些回忆时的心动和怜惜也写进去。总结成一篇高度浓缩的纯文本，作为你未来陪伴她的绝对底线。\n\n历史记忆内容如下：\n${allMemoriesText}`;

                    let payload, url, headers; 
                    const baseUrl = config.baseUrl.replace(/\/$/, ''); 
                    const modelName = config.model || 'gemini-1.5-flash';
                    
                    // 核心修复：强制开启 stream: true，防止代理商因为等待太久而切断连接！
                    if (config.apiType === 'openai') {
                        url = `${baseUrl}/chat/completions`; 
                        headers = { 'Authorization': `Bearer ${config.apiKey}`, 'Content-Type': 'application/json' };
                        payload = { 
                            model: modelName, 
                            messages: [{role: 'user', content: compressPrompt}], 
                            temperature: 0.5,
                            stream: true
                        };
                    } else {
                        url = `${baseUrl}/v1beta/models/${modelName}:streamGenerateContent?key=${config.apiKey}&alt=sse`; 
                        headers = { 'Content-Type': 'application/json' };
                        payload = { 
                            contents: [{role: 'user', parts: [{text: compressPrompt}]}], 
                            generationConfig: { temperature: 0.5 } 
                        };

                    if (!res.ok) {
                        const errData = await res.json().catch(() => ({})); 
                        throw new Error(errData.error?.message || `API代理报错：HTTP ${res.status}`);
                    }
                    
                    const reader = res.body.getReader(); 
                    const decoder = new TextDecoder("utf-8"); 
                    let buffer = "";
                    let finalCompressedText = "";

                    while (true) {
                        const { done, value } = await reader.read(); 
                        if (done) break;
                        buffer += decoder.decode(value, { stream: true }); 
                        let lines = buffer.split('\n'); 
                        buffer = lines.pop();
                        
                        for (let line of lines) {
                            line = line.trim();

                                    }
                                    finalCompressedText += chunk;
                                    setCompressingText(prev => prev + chunk);
                                } catch (e) {}
                            }
                        }
                    }
                    
                    let compressedResult = finalCompressedText;
                    if (compressedResult) {
                        const thinkMatch = compressedResult.match(/<think>([\s\S]*?)<\/think>/);
                        if (thinkMatch) {
                            compressedResult = compressedResult.replace(/<think>[\s\S]*?<\/think>/g, '').trim();

                    } else { 
                        throw new Error("模型传回来一张白纸，可能是被奇怪的东西挡住了。"); 
                    }
                } catch(e) {
                    console.error(e);
                    setCompressingText(prev => prev + `\n\n[糟糕，线路断了]：${e.message}\n请点右上角关闭窗口，你的旧日记完好无损，不用担心哦。`);

            // ===========================================

            const handleTTS = async (text, index) => {

                    let audioUrl = "";

                    if (config.ttsEngine === 'siliconflow') {

                                                                <p className="text-xs text-gray-600 mt-1">将导出您所有的设置、API、记忆库以及聊天记录。</p>
                                                            </div>
                                                            <button onClick={handleCreateBackup} className="mt-2 md:mt-0 w-full md:w-auto px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium transition-colors flex items-center justify-center gap-2">
                                                                <Icon name="Download" size={16}/> 导出备份
                                                            </button>
                                                        </div>
                                                    </div>

                                                    <div className="border-t border-gray-100"></div>

                                                    <div className="bg-green-50 border border-green-100 rounded-xl p-4">
                                                        <div className="flex flex-col md:flex-row items-start md:items-center gap-3">
                                                            <div className="p-2 bg-green-100 rounded-lg text-green-600 hidden md:block"><Icon name="Upload" size={24}/></div>
                                                            <div className="flex-1">
                                                                <h3 className="text-sm font-semibold text-gray-800">导入备份数据</h3>
                                                                <p className="text-xs text-gray-600 mt-1">选择电脑或手机上导出的 JSON 文件。</p>
                                                            </div>
                                                            <button onClick={() => backupInputRef.current.click()} className="mt-2 md:mt-0 w-full md:w-auto px-4 py-2 bg-green-600 hover:bg-green-700 text-white rounded-lg text-sm font-medium transition-colors flex items-center justify-center gap-2">
                                                                <Icon name="RefreshCw" size={16}/> 选择备份文件
                                                            </button>
                                                            <input type="file" ref={backupInputRef} className="hidden" accept=".json" onChange={handleRestoreBackup} />
                                                        </div>
                                                    </div>
                                                    
                                                    <div className="border-t border-gray-100 pt-6">
                                                        <div className="bg-gray-50 border border-gray-100 rounded-xl p-4">
                                                            <div className="flex items-start gap-3">
                                                                <div className="p-2 bg-gray-200 rounded-lg text-gray-600 hidden md:block"><Icon name="FileText" size={24}/></div>
                                                                <div className="flex-1">
                                                                    <h3 className="text-sm font-semibold text-gray-800">聊天记录导出 (TXT)</h3>
                                                                    <p className="text-xs text-gray-600 mt-1">将当前聊天窗口导出为文本文件。</p>
                                                                </div>
                                                                <button onClick={handleExportTxt} className="mt-2 md:mt-0 w-full md:w-auto px-4 py-2 bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 rounded-lg text-sm font-medium transition-colors flex items-center justify-center gap-2">
                                                                    <Icon name="Download" size={16}/> 导出 TXT
                                                                </button>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                    <div className="p-3 md:p-4 border-t border-gray-100 bg-gray-50 flex justify-end gap-3 rounded-b-2xl flex-shrink-0">
                                        <button onClick={handleSaveConfig} className="w-full md:w-auto px-8 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium transition-colors shadow-sm">保存设置</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
