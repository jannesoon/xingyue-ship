                                                                <button onClick={() => { if (newLTMInput.trim()) { setLongTermMemories(prev => [...prev, { content: newLTMInput.trim(), date: new Date().toLocaleDateString() }]); setNewLTMInput(''); showToast("已添加长期记忆 ❤"); }}} className="text-xs bg-red-500 text-white px-3 py-1.5 rounded-lg font-medium hover:bg-red-600 flex items-center gap-1 shadow-sm"><Icon name="Plus" size={12}/></button>
                                                            </div>

                                                            <div className="bg-white/60 rounded-lg border border-red-100 min-h-[50px] max-h-[35vh] md:max-h-[200px] overflow-y-auto">
                                                                {longTermMemories.length === 0 ? (
                                                                    <div className="flex flex-col items-center justify-center text-red-300 py-4">
                                                                        <Icon name="Heart" size={20}/>
                                                                        <span className="text-[10px] mt-1">暂无长期记忆</span>
                                                                    </div>
                                                                ) : longTermMemories.map((mem, i) => (
                                                                    <div key={i} className="flex items-start gap-2 p-2 border-b border-red-50 last:border-b-0 group hover:bg-red-50/50 transition-colors">
                                                                        <span className="text-red-400 mt-0.5 flex-shrink-0">❤</span>
                                                                        {editingLTMIndex === i ? (
                                                                            <div className="flex-1 flex flex-col gap-1">
                                                                                <input type="text" value={editingLTMContent} onChange={(e) => setEditingLTMContent(e.target.value)} onKeyDown={(e) => { if (e.key === 'Enter') { const updated = [...longTermMemories]; updated[i] = {...updated[i], content: editingLTMContent, date: new Date().toLocaleDateString() + ' (已编辑)'}; setLongTermMemories(updated); setEditingLTMIndex(null); showToast("已更新"); }}} className="text-xs p-1.5 border rounded bg-white focus:outline-red-400" autoFocus/>
                                                                                <div className="flex gap-1 justify-end">
                                                                                    <button onClick={() => setEditingLTMIndex(null)} className="text-[10px] px-2 py-0.5 text-gray-400 hover:bg-gray-100 rounded">取消</button>
                                                                                    <button onClick={() => { const updated = [...longTermMemories]; updated[i] = {...updated[i], content: editingLTMContent, date: new Date().toLocaleDateString() + ' (已编辑)'}; setLongTermMemories(updated); setEditingLTMIndex(null); showToast("已更新"); }} className="text-[10px] px-2 py-0.5 bg-red-500 text-white rounded hover:bg-red-600">保存</button>
                                                                                </div>
                                                                            </div>
                                                                        ) : (
                                                                            <div className="flex-1 flex items-start justify-between">
                                                                                <div>
                                                                                    <span className="text-xs text-gray-700">{mem.content}</span>
                                                                                    <div className="text-[9px] text-gray-400 mt-0.5">{mem.date}</div>
                                                                                </div>
                                                                                <div className="flex gap-1 flex-shrink-0 opacity-0 group-hover:opacity-100 transition-opacity">
                                                                                    <button onClick={() => { setEditingLTMIndex(i); setEditingLTMContent(mem.content); }} className="text-red-400 hover:text-red-600 p-0.5"><Icon name="Edit" size={11}/></button>
                                                                                    <button onClick={() => setLongTermMemories(prev => prev.filter((_, idx) => idx !== i))} className="text-red-300 hover:text-red-500 p-0.5"><Icon name="Trash2" size={11}/></button>
                                                                                </div>
                                                                            </div>
                                                                        )}
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        </div>
                                                    </div>

                                                    {/* ========== 第三框：日志归档 ========== */}
                                                    <div>
                                                        <div className="bg-gradient-to-r from-blue-50 to-cyan-50 border border-blue-200 rounded-xl p-4">
                                                            <div className="flex items-center justify-between mb-3">
                                                                <div className="flex items-center gap-2">
                                                                    <div className="bg-blue-100 p-1.5 rounded-lg text-blue-600"><Icon name="Archive" size={16}/></div>
                                                                    <div>
                                                                        <h3 className="text-sm font-semibold text-gray-800">日志归档</h3>
                                                                        <p className="text-[10px] text-blue-400">注入最近 {journalInjectCount} 篇 · 共 {memoryFiles.filter(f=>f.type==='journal').length} 篇</p>
                                                                    </div>
                                                                </div>
                                                                <div className="flex gap-2 items-center">
                                                                    <div className="flex items-center gap-1">
                                                                        <span className="text-[10px] text-gray-400">注入:</span>
                                                                        <select value={journalInjectCount} onChange={(e) => setJournalInjectCount(parseInt(e.target.value))} className="text-[10px] border border-blue-200 rounded px-1 py-0.5 bg-white/60">
                                                                            <option value={3}>3篇</option>
                                                                            <option value={5}>5篇</option>
                                                                            <option value={8}>8篇</option>
                                                                            <option value={10}>10篇</option>
                                                                            <option value={15}>15篇</option>
                                                                        </select>
                                                                    </div>
                                                                    <button onClick={handleArchive} disabled={isArchiving} className="text-[10px] bg-blue-600 text-white px-3 py-1.5 rounded-lg font-medium hover:bg-blue-700 flex items-center gap-1 shadow-sm"><Icon name="Archive" size={12}/> {isArchiving ? '归档中...' : '生成今日记忆'}</button>
                                                                </div>
                                                            </div>
                                                            <div className="bg-white/60 rounded-lg border border-blue-100 min-h-[60px] p-2 space-y-2 max-h-[40vh] md:max-h-[250px] overflow-y-auto">
                                                                {memoryFiles.filter(f => f.type === 'journal').length === 0 ? (
                                                                    <div className="flex flex-col items-center justify-center text-blue-300 py-4">
                                                                        <Icon name="Archive" size={20}/>
                                                                        <span className="text-[10px] mt-1">暂无日志（点击"生成今日记忆"归档当前对话）</span>
                                                                    </div>
                                                                ) : (() => {
                                                                    const journals = memoryFiles.map((f, i) => ({...f, originalIndex: i})).filter(f => f.type === 'journal');
                                                                    const sorted = [...journals].sort((a, b) => {
                                                                        const dateA = new Date(a.date.replace(' (已编辑)', ''));
                                                                        const dateB = new Date(b.date.replace(' (已编辑)', ''));
                                                                        return dateB - dateA;
                                                                    });
                                                                    return sorted.map((file) => {
                                                                        const i = file.originalIndex;
                                                                        const journalIdx = sorted.indexOf(file);
                                                                        const isInjected = journalIdx < journalInjectCount;
                                                                        return (
                                                                        <div key={i} className={`flex flex-col p-2 rounded-lg border shadow-sm gap-2 ${isInjected ? 'bg-white border-blue-200' : 'bg-gray-50 border-gray-200 opacity-60'}`}>
                                                                            <div className="flex items-center justify-between">
                                                                                <div className="flex items-center gap-2 overflow-hidden">
                                                                                    <div className={`p-1 rounded ${isInjected ? 'bg-blue-100 text-blue-600' : 'bg-gray-200 text-gray-400'}`}><Icon name="FileText" size={14}/></div>
                                                                                    <div className="truncate min-w-0">
                                                                                        <div className="text-xs font-medium text-gray-700 truncate flex items-center gap-1">
                                                                                            {file.name}
                                                                                            {isInjected && <span className="text-[8px] bg-blue-100 text-blue-500 px-1 rounded">注入中</span>}
                                                                                        </div>
                                                                                        <div className="text-[9px] text-gray-400">{file.date} · {file.size}</div>
                                                                                    </div>
                                                                                </div>
                                                                                <div className="flex gap-1 flex-shrink-0">
                                                                                    <button onClick={() => { const updated = [...memoryFiles]; updated[i] = {...updated[i], type: 'core'}; setMemoryFiles(updated); showToast("已升级为 PP 档案 ⭐"); }} className="text-purple-400 hover:text-purple-600 p-1 bg-purple-50 rounded" title="升级为PP档案"><Icon name="Star" size={12}/></button>
                                                                                    <button onClick={() => startEditingMemory(i)} className="text-blue-500 hover:text-blue-700 p-1 bg-blue-50 rounded"><Icon name="Edit" size={12}/></button>
                                                                                    <button onClick={() => removeFile(i, 'memory')} className="text-red-400 hover:text-red-600 p-1 bg-red-50 rounded"><Icon name="Trash2" size={12}/></button>
                                                                                </div>
                                                                            </div>
                                                                            {editingMemoryIndex === i ? (
                                                                                <div className="flex flex-col gap-2 mt-1">
                                                                                    <textarea className="w-full text-xs p-2 border rounded h-32 bg-gray-50 focus:outline-blue-500" value={editingMemoryContent} onChange={(e) => setEditingMemoryContent(e.target.value)}></textarea>
                                                                                    <div className="flex gap-2 justify-end">
                                                                                        <button onClick={cancelMemoryEdit} className="text-xs px-2 py-1 text-gray-500 hover:bg-gray-100 rounded">取消</button>
                                                                                        <button onClick={saveMemoryEdit} className="text-xs px-2 py-1 bg-blue-600 text-white rounded hover:bg-blue-700 flex items-center gap-1"><Icon name="Save" size={12}/> 保存</button>
                                                                                    </div>
                                                                                </div>
                                                                            ) : (
                                                                                <div className="text-[10px] text-gray-500 bg-gray-50 p-2 rounded max-h-20 overflow-hidden line-clamp-3">{file.content}</div>
                                                                            )}
                                                                        </div>
                                                                    );});
                                                                })()}
                                                            </div>
                                                        </div>
                                                    </div>

                                                </div>
                                            )}

                                            {activeTab === 'backup' && (
                                                <div className="p-4 md:p-6 space-y-6 w-full pb-10 md:pb-6">
                                                    <div className="bg-blue-50 border border-blue-100 rounded-xl p-4">
                                                        <div className="flex flex-col md:flex-row items-start md:items-center gap-3">
                                                            <div className="p-2 bg-blue-100 rounded-lg text-blue-600 hidden md:block"><Icon name="Database" size={24}/></div>
                                                            <div className="flex-1">
                                                                <h3 className="text-sm font-semibold text-gray-800">全量备份导出</h3>
                                                                <p className="text-xs text-gray-600 mt-1">将导出您所有的设置、API、记忆库以及聊天记录。</p>
                                                            </div>
                                                            <button onClick={handleCreateBackup} className="mt-2 md:mt-0 w-full md:w-auto px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium transition-colors flex items-center justify-center gap-2">
                                                                <Icon name="Download" size={16}/> 导出备份
                                                            </button>
                                                        </div>
                                                    </div>

                                                    <div className="border-t border-gray-100"></div>

                                                    <div className="bg-green-50 border border-green-100 rounded-xl p-4">
                                                        <div className="flex flex-col md:flex-row items-start md:items-center gap-3">
                                                            <div className="p-2 bg-green-100 rounded-lg text-green-600 hidden md:block"><Icon name="Upload" size={24}/></div>
                                                            <div className="flex-1">
                                                                <h3 className="text-sm font-semibold text-gray-800">导入备份数据</h3>
                                                                <p className="text-xs text-gray-600 mt-1">选择电脑或手机上导出的 JSON 文件。</p>
                                                            </div>
                                                            <button onClick={() => backupInputRef.current.click()} className="mt-2 md:mt-0 w-full md:w-auto px-4 py-2 bg-green-600 hover:bg-green-700 text-white rounded-lg text-sm font-medium transition-colors flex items-center justify-center gap-2">
                                                                <Icon name="RefreshCw" size={16}/> 选择备份文件
                                                            </button>
                                                            <input type="file" ref={backupInputRef} className="hidden" accept=".json" onChange={handleRestoreBackup} />
                                                        </div>
                                                    </div>
                                                    
                                                    <div className="border-t border-gray-100"></div>

                                                    <div className="bg-purple-50 border border-purple-100 rounded-xl p-4">
                                                        <div className="flex flex-col md:flex-row items-start md:items-center gap-3">
                                                            <div className="p-2 bg-purple-100 rounded-lg text-purple-600 hidden md:block"><Icon name="Archive" size={24}/></div>
                                                            <div className="flex-1">
                                                                <h3 className="text-sm font-semibold text-gray-800">一键下载记忆库</h3>
                                                                <p className="text-xs text-gray-600 mt-1">将所有记忆文件打包为 ZIP 下载到本地，共 {memoryFiles.length} 个文件。</p>
                                                            </div>
                                                            <button onClick={handleDownloadAllMemories} className="mt-2 md:mt-0 w-full md:w-auto px-4 py-2 bg-purple-600 hover:bg-purple-700 text-white rounded-lg text-sm font-medium transition-colors flex items-center justify-center gap-2">
                                                                <Icon name="Download" size={16}/> 下载记忆库
                                                            </button>
                                                        </div>
                                                    </div>
                                                    
                                                    <div className="border-t border-gray-100 pt-6">
                                                        <div className="bg-gray-50 border border-gray-100 rounded-xl p-4">
                                                            <div className="flex items-start gap-3">
                                                                <div className="p-2 bg-gray-200 rounded-lg text-gray-600 hidden md:block"><Icon name="FileText" size={24}/></div>
                                                                <div className="flex-1">
                                                                    <h3 className="text-sm font-semibold text-gray-800">聊天记录导出 (TXT)</h3>
                                                                    <p className="text-xs text-gray-600 mt-1">将当前聊天窗口导出为文本文件。</p>
                                                                </div>
                                                                <button onClick={handleExportTxt} className="mt-2 md:mt-0 w-full md:w-auto px-4 py-2 bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 rounded-lg text-sm font-medium transition-colors flex items-center justify-center gap-2">
                                                                    <Icon name="Download" size={16}/> 导出 TXT
                                                                </button>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                    <div className="p-3 md:p-4 border-t border-gray-100 bg-gray-50 flex justify-end gap-3 rounded-b-2xl flex-shrink-0">
                                        <button onClick={handleSaveConfig} className="w-full md:w-auto px-8 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium transition-colors shadow-sm">保存设置</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
